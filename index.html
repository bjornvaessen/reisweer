<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reisweer — weer voor je hele route</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF1EC;
    --card:#FFFFFF;
    --ink:#20262A;
    --ink-soft:#5B6663;
    --line:#CBD3C8;
    --amber:#E07C1E;
    --amber-soft:#F6E3CC;
    --teal:#186A72;
    --teal-soft:#D9EAE8;
    --violet:#5C4A87;
    --slate:#8B948F;
    --iceblue:#4C86B8;
    --danger:#B8402A;
    --danger-soft:#F5DCD5;
    --radius:10px;
    --shadow:0 1px 2px rgba(32,38,42,0.06), 0 4px 14px rgba(32,38,42,0.06);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,.display{ font-family:'IBM Plex Sans Condensed', sans-serif; font-weight:600; letter-spacing:0.01em; margin:0; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  button{ font-family:inherit; cursor:pointer; }
  input{ font-family:inherit; }
  button:focus-visible, input:focus-visible, a:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; }

  /* header */
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 20px; border-bottom:1px solid var(--line);
  }
  .topbar-brand{ display:flex; align-items:center; gap:12px; min-width:0; }
  .brand-mark{ width:38px; height:38px; flex-shrink:0; }
  .brand h1{ font-size:19px; line-height:1.1; }
  .brand p{ margin:2px 0 0; font-size:12.5px; color:var(--ink-soft); }
  .settings-btn{ flex-shrink:0; padding:8px; }

  /* layout */
  .layout{ max-width:1180px; margin:0 auto; }
  @media (min-width:880px){
    .layout{ display:grid; grid-template-columns:272px 1fr; align-items:start; }
  }

  /* sidebar */
  .sidebar{ padding:18px 16px; border-bottom:1px solid var(--line); }
  @media (min-width:880px){
    .sidebar{ border-bottom:none; border-right:1px solid var(--line); min-height:calc(100vh - 66px); position:sticky; top:0; }
  }
  .sidebar-title{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); margin:0 0 10px; }
  .trip-list{ list-style:none; margin:0 0 14px; padding:0; display:flex; flex-direction:column; gap:6px; }
  .trip-item{
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    padding:9px 10px; border-radius:var(--radius); border:1px solid transparent;
  }
  .trip-item.active{ background:var(--card); border-color:var(--line); box-shadow:var(--shadow); }
  .trip-select{ background:none; border:none; flex:1; min-width:0; text-align:left; padding:0; font-size:14px; color:var(--ink); }
  .trip-select span{ display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .trip-meta{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .icon-btn{ background:none; border:none; padding:5px; border-radius:6px; color:var(--ink-soft); display:flex; flex-shrink:0; }
  .icon-btn:hover{ background:var(--teal-soft); color:var(--teal); }
  .new-trip-btn{
    display:flex; align-items:center; gap:8px; width:100%;
    padding:9px 12px; border-radius:var(--radius); border:1px dashed var(--line);
    background:none; color:var(--teal); font-size:13.5px; font-weight:500;
  }
  .new-trip-btn:hover{ border-color:var(--teal); background:var(--teal-soft); }
  .confirm-row{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--danger); flex-wrap:wrap; }
  .mini-btn{ padding:3px 8px; font-size:11.5px; border-radius:6px; border:1px solid var(--line); background:var(--card); }
  .mini-btn:hover{ border-color:var(--teal); color:var(--teal); }
  .sidebar-foot{ margin-top:16px; padding-top:12px; border-top:1px solid var(--line); }
  .backup-btn{
    display:flex; align-items:center; gap:7px; width:100%;
    padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:var(--card);
    color:var(--teal); font-size:13px; font-weight:500;
  }
  .backup-btn:hover{ border-color:var(--teal); background:var(--teal-soft); }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(32,38,42,0.45); z-index:50;
    display:flex; align-items:center; justify-content:center; padding:16px;
  }
  .modal-card{
    background:var(--card); border-radius:12px; max-width:480px; width:100%;
    max-height:88vh; overflow-y:auto; padding:18px 20px 20px; box-shadow:0 8px 30px rgba(0,0,0,0.25);
  }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .modal-head h3{ font-size:17px; }
  .modal-sub{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin:0 0 14px; }
  .modal-card h4{ font-family:'IBM Plex Sans Condensed', sans-serif; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); margin:0 0 8px; }
  .modal-hint{ font-size:12px; color:var(--ink-soft); margin:8px 0 6px; }
  .modal-textarea{
    width:100%; min-height:80px; resize:vertical; border:1px solid var(--line); border-radius:7px;
    padding:8px 9px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink); background:var(--paper);
    margin-bottom:8px;
  }
  .provider-option{ display:flex; gap:9px; align-items:flex-start; padding:9px 0; border-bottom:1px solid var(--line); cursor:pointer; font-size:13.5px; }
  .provider-option:last-of-type{ border-bottom:none; }
  .provider-option input{ margin-top:3px; flex-shrink:0; }
  .text-link{ background:none; border:none; padding:0; font-size:12px; color:var(--ink-soft); text-decoration:underline; }
  .text-link:hover{ color:var(--danger); }

  /* main */
  .main{ padding:20px 20px 60px; }
  .empty-state{ text-align:center; padding:56px 20px; color:var(--ink-soft); }
  .empty-state .display{ font-size:19px; color:var(--ink); margin-bottom:6px; }
  .empty-state p{ max-width:360px; margin:0 auto 18px; font-size:14px; line-height:1.5; }

  .trip-header{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:18px; }
  .trip-header-actions{ flex-shrink:0; padding-top:2px; }
  .trip-name-input{
    font-family:'IBM Plex Sans Condensed', sans-serif; font-weight:600; font-size:25px;
    border:1px solid transparent; background:none; padding:3px 6px; margin:0 0 0 -6px; border-radius:7px; color:var(--ink);
    max-width:100%; width:100%;
  }
  .trip-name-input:hover{ border-color:var(--line); }
  .trip-name-input:focus{ border-color:var(--teal); background:var(--card); outline:none; }
  .trip-sub{ font-size:12.5px; color:var(--ink-soft); margin-top:4px; }
  .trip-header-view{ margin-bottom:18px; }
  .trip-view-title{ font-size:25px; }

  .btn{ border-radius:8px; padding:8px 14px; font-size:13.5px; font-weight:500; border:1px solid var(--line); background:var(--card); }
  .btn:hover{ border-color:var(--teal); color:var(--teal); }
  .btn-primary{ background:var(--teal); border-color:var(--teal); color:#fff; }
  .btn-primary:hover{ background:#145258; color:#fff; }
  .btn-danger-outline{ background:none; border:1px solid var(--danger); color:var(--danger); border-radius:8px; padding:7px 12px; font-size:12.5px; font-weight:500; }
  .btn-danger-outline:hover{ background:var(--danger-soft); }

  /* stops timeline */
  .stops-list{ display:flex; flex-direction:column; }
  .stop-row{ display:grid; grid-template-columns:34px 1fr; gap:10px; position:relative; padding-bottom:20px; }
  .stop-row:last-child{ padding-bottom:0; }
  .marker-col{ position:relative; display:flex; justify-content:center; }
  .marker-dot{
    width:26px; height:26px; border-radius:50%; background:var(--card); border:2px solid var(--teal);
    color:var(--teal); font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:600;
    display:flex; align-items:center; justify-content:center; z-index:1;
  }
  .stop-row:not(:last-child) .marker-col::after{
    content:''; position:absolute; top:27px; left:50%; transform:translateX(-50%);
    width:2px; height:calc(100% - 7px);
    background-image:linear-gradient(var(--teal) 55%, transparent 0%);
    background-size:2px 9px; background-repeat:repeat-y; opacity:0.5;
  }

  .stop-card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); }
  .stop-card-top{ display:flex; flex-wrap:wrap; gap:10px 14px; align-items:flex-end; margin-bottom:12px; }
  .stop-view-head{ display:flex; flex-wrap:wrap; align-items:baseline; justify-content:space-between; gap:6px 14px; margin-bottom:12px; }
  .stop-view-name{ font-size:17px; }
  .stop-view-dates{ font-size:12px; color:var(--ink-soft); }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); }
  .field input[type=text], .field input[type=date]{
    border:1px solid var(--line); border-radius:7px; padding:7px 9px; font-size:13.5px; color:var(--ink); background:var(--paper);
    min-width:0;
  }
  .search-wrap{ position:relative; flex:1 1 200px; min-width:180px; }
  .suggestions{
    position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--card); border:1px solid var(--line);
    border-radius:8px; box-shadow:var(--shadow); z-index:5; max-height:220px; overflow-y:auto;
  }
  .suggestions button{ display:block; width:100%; text-align:left; padding:8px 10px; border:none; background:none; font-size:13px; color:var(--ink); border-bottom:1px solid var(--line); }
  .suggestions button:last-child{ border-bottom:none; }
  .suggestions button:hover{ background:var(--teal-soft); }
  .sugg-empty{ padding:8px 10px; font-size:12.5px; color:var(--ink-soft); }

  .stop-actions{ display:flex; gap:2px; margin-left:auto; }

  /* weather chips */
  .weather-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .day-chip{ width:80px; flex-shrink:0; border:1px solid var(--line); border-radius:8px; padding:8px 4px; text-align:center; background:var(--paper); }
  .day-chip.is-today{ border-color:var(--amber); background:var(--amber-soft); }
  .day-chip.is-approx{ border-style:dashed; }
  .day-chip .day-label{ font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--ink-soft); }
  .day-icon{ width:34px; height:34px; margin:4px auto; display:block; }
  .temps{ font-family:'IBM Plex Mono',monospace; font-size:13px; }
  .t-max{ font-weight:600; color:var(--ink); }
  .t-min{ color:var(--ink-soft); }
  .precip{ margin-top:4px; display:inline-block; font-size:10px; font-family:'IBM Plex Mono',monospace; background:var(--teal-soft); color:var(--teal); border-radius:20px; padding:1px 6px; }
  .desc{ font-size:9.5px; color:var(--ink-soft); margin-top:3px; min-height:11px; }
  .day-chip.placeholder{ opacity:0.75; }
  .day-chip.placeholder .desc{ margin-top:14px; font-size:10.5px; }
  .weather-status{ font-size:12.5px; color:var(--ink-soft); padding:4px 2px; }

  .edit-actions-row{ display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-top:8px; margin-left:44px; }
  .add-stop-btn{
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 12px; border-radius:8px; border:1px dashed var(--line); background:none; color:var(--teal); font-size:13px;
  }
  .add-stop-btn:hover{ border-color:var(--teal); background:var(--teal-soft); }

  .warn{ font-size:11.5px; color:var(--danger); margin:-6px 0 10px; }

  .save-error-banner{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--amber-soft); color:#7A4300; border:1px solid var(--amber);
    border-radius:8px; padding:9px 12px; font-size:12.5px; margin:0 20px 14px;
  }
  .save-error-banner button{ background:none; border:none; color:#7A4300; font-size:16px; line-height:1; padding:0 2px; flex-shrink:0; }
  @media (min-width:880px){ .save-error-banner{ margin:14px 20px 0; grid-column:1/-1; } }
  .save-ok-banner{
    background:var(--teal-soft); color:var(--teal); border:1px solid var(--teal);
    border-radius:8px; padding:9px 12px; font-size:12.5px; margin:0 20px 14px; font-weight:500;
  }
  @media (min-width:880px){ .save-ok-banner{ margin:14px 20px 0; grid-column:1/-1; } }

  ::selection{ background:var(--amber-soft); }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <svg class="brand-mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#186A72"/>
      <g fill="#ffffff" fill-rule="evenodd">
        <rect x="29" y="5" width="2.4" height="5.5" rx="1.2" transform="rotate(20 30.2 7.75)"/>
        <rect x="33.5" y="9" width="2.4" height="5.5" rx="1.2" transform="rotate(70 34.7 11.75)"/>
        <rect x="24.5" y="2" width="2.4" height="5.5" rx="1.2" transform="rotate(-25 25.7 4.75)"/>
        <path d="M20 8c-5.2 0-9.4 4.1-9.4 9.3c0 6.8 9.4 15.7 9.4 15.7s9.4-8.9 9.4-15.7C29.4 12.1 25.2 8 20 8Z"/>
        <circle cx="20" cy="17.3" r="3.6" fill="#186A72"/>
      </g>
    </svg>
    <div class="brand">
      <h1>Reisweer</h1>
      <p>Het weer voor je hele route, in één overzicht.</p>
    </div>
  </div>
  <button type="button" class="icon-btn settings-btn" onclick="App.openSettings()" title="Instellingen" aria-label="Instellingen">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 13a7.4 7.4 0 0 0 .1-2l2.1-1.6-2-3.5-2.5 1a7.7 7.7 0 0 0-1.7-1L15 3h-6l-.4 2.9a7.7 7.7 0 0 0-1.7 1l-2.5-1-2 3.5L4.5 11a7.4 7.4 0 0 0 0 2l-2.1 1.6 2 3.5 2.5-1c.5.4 1.1.8 1.7 1L9 21h6l.4-2.9c.6-.2 1.2-.6 1.7-1l2.5 1 2-3.5L19.4 13Z" stroke-linejoin="round"/></svg>
  </button>
</div>
<div class="layout" id="layout"></div>
<div id="modal-host"></div>

<script>
/* ---------- helpers ---------- */
function toISO(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
function escHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escAttr(str){ return escHtml(str); }

function dateRangeArr(startISO, endISO){
  const out=[];
  if(!startISO || !endISO) return out;
  let d=new Date(startISO+'T00:00:00'); const end=new Date(endISO+'T00:00:00');
  if(d>end) return out;
  while(d<=end){ out.push(toISO(d)); d=addDays(d,1); }
  return out;
}
function formatDayLabel(iso){
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('nl-NL', {weekday:'short', day:'numeric', month:'short'});
}
function formatRangeLabel(startISO,endISO){
  const s=new Date(startISO+'T00:00:00'), e=new Date(endISO+'T00:00:00');
  const opts={day:'numeric', month:'short'};
  if(startISO===endISO) return s.toLocaleDateString('nl-NL', opts);
  return s.toLocaleDateString('nl-NL', opts) + ' – ' + e.toLocaleDateString('nl-NL', opts);
}

const TODAY = new Date();
const TODAY_ISO = toISO(TODAY);
const HORIZON_ISO = toISO(addDays(TODAY, 15));
const STORAGE_KEY = 'trips';

/* ---------- weather code mapping (Open-Meteo WMO codes) ---------- */
const WEATHER_MAP = {
  0:['sun','Zonnig'],1:['partly','Licht bewolkt'],2:['partly','Half bewolkt'],3:['cloud','Bewolkt'],
  45:['fog','Mist'],48:['fog','Rijpmist'],
  51:['drizzle','Motregen'],53:['drizzle','Motregen'],55:['drizzle','Motregen'],56:['drizzle','IJzel'],57:['drizzle','IJzel'],
  61:['rain','Regen'],63:['rain','Regen'],65:['rain','Zware regen'],66:['rain','IJzel'],67:['rain','IJzel'],
  71:['snow','Sneeuw'],73:['snow','Sneeuw'],75:['snow','Zware sneeuw'],77:['snow','Sneeuwkorrels'],
  80:['rain','Buien'],81:['rain','Buien'],82:['rain','Zware buien'],
  85:['snow','Sneeuwbuien'],86:['snow','Sneeuwbuien'],
  95:['storm','Onweer'],96:['storm','Onweer + hagel'],99:['storm','Onweer + hagel']
};
function weatherInfo(code){ return WEATHER_MAP[code] || ['cloud','Onbekend']; }
function fmtTemp(v){ return (typeof v==='number' && isFinite(v)) ? Math.round(v)+'°' : '–'; }

const CLOUD_BASE = '<ellipse cx="20" cy="26" rx="9" ry="4.5"/><circle cx="14" cy="21.5" r="4.8"/><circle cx="20.5" cy="18.5" r="6"/><circle cx="26.5" cy="21.5" r="4.2"/>';
const CLOUD_HIGH = '<ellipse cx="20" cy="23" rx="9" ry="4.5"/><circle cx="14" cy="18.5" r="4.8"/><circle cx="20.5" cy="15.5" r="6"/><circle cx="26.5" cy="18.5" r="4.2"/>';
const SUN_RAYS = [0,45,90,135,180,225,270,315].map(a=>'<rect x="18.7" y="5" width="2.6" height="6" rx="1.3" transform="rotate('+a+' 20 20)"/>').join('');
const WEATHER_STYLE = {
  sun:    { color:'var(--amber)',   glyph:'<circle cx="20" cy="20" r="7.5"/>'+SUN_RAYS },
  partly: { color:'var(--amber)',   glyph:'<circle cx="14" cy="13" r="4"/><rect x="12.7" y="4.5" width="2.6" height="4" rx="1.3"/><rect x="4.5" y="11.7" width="4" height="2.6" rx="1.3"/><rect x="7.6" y="7.6" width="2.6" height="4" rx="1.3" transform="rotate(-45 8.9 9.6)"/>'+CLOUD_BASE },
  cloud:  { color:'var(--slate)',   glyph:CLOUD_BASE },
  fog:    { color:'var(--slate)',   glyph:'<rect x="9" y="13" width="14" height="2.6" rx="1.3"/><rect x="9" y="18.4" width="22" height="2.6" rx="1.3"/><rect x="9" y="23.8" width="17" height="2.6" rx="1.3"/><rect x="9" y="29.2" width="22" height="2.6" rx="1.3"/>' },
  drizzle:{ color:'var(--teal)',    glyph:CLOUD_HIGH+'<ellipse cx="15" cy="32" rx="1.5" ry="2.6"/><ellipse cx="20" cy="34" rx="1.5" ry="2.6"/><ellipse cx="25" cy="32" rx="1.5" ry="2.6"/>' },
  rain:   { color:'var(--teal)',    glyph:CLOUD_HIGH+'<ellipse cx="14" cy="33" rx="1.7" ry="3.4"/><ellipse cx="20" cy="35.5" rx="1.7" ry="3.4"/><ellipse cx="26" cy="33" rx="1.7" ry="3.4"/>' },
  snow:   { color:'var(--iceblue)', glyph:CLOUD_HIGH+'<circle cx="14" cy="32.5" r="2"/><circle cx="20" cy="34.5" r="2"/><circle cx="26" cy="32.5" r="2"/>' },
  storm:  { color:'var(--violet)',  glyph:CLOUD_HIGH+'<path d="M22 20.5l-9.5 11h5.7l-1.7 7.5L26 27h-6.2l2.2-6.5Z"/>' }
};
function iconSvg(name){
  const s = WEATHER_STYLE[name] || WEATHER_STYLE.cloud;
  return '<svg class="day-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="20" fill="'+s.color+'"/><g fill="#fff" fill-rule="evenodd">'+s.glyph+'</g></svg>';
}

/* ---------- state ---------- */
let state = {
  loading: true,
  trips: [],
  selectedTripId: null,
  mode: 'view', // 'view' shows the polished read-only itinerary; 'edit' shows the editable form
  confirmDeleteTripId: null,
  confirmClearAll: false,
  saveError: null,
  saveConfirmation: null,
  showBackupPanel: false,
  importFeedback: null,
  showSettingsPanel: false,
  settings: { provider: 'openmeteo', vcKey: '' }
};
const SETTINGS_KEY = 'reisweer-settings';
const weatherCache = {};   // stopId -> {key,status,days}
const searchState = {};    // stopId -> {timer, seq}
const lastSuggestions = {}; // stopId -> [{name,lat,lon}]

/* ---------- storage ----------
   This file runs standalone (downloaded and opened directly in a browser),
   so there is no Claude.ai storage bridge to rely on. Plain localStorage
   is the right tool here — it's the browser's own, always-available
   persistence, and works the same whether opened from disk or hosted. */
let persistenceWarned = false;
function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && typeof parsed==='object'){
        if(parsed.provider==='openmeteo' || parsed.provider==='visualcrossing') state.settings.provider = parsed.provider;
        if(typeof parsed.vcKey==='string') state.settings.vcKey = parsed.vcKey;
      }
    }
  }catch(e){ /* keep defaults */ }
}
function saveSettingsState(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); }catch(e){ /* non-critical */ }
}
function loadTrips(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    state.trips = raw ? JSON.parse(raw) : [];
  }catch(e){
    state.trips = [];
  }
  state.loading = false;
  if(state.trips.length && !state.selectedTripId) state.selectedTripId = state.trips[0].id;
  render();
}
let saveTimer=null;
let saveConfirmTimer=null;
function persistTripsNow(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.trips));
    const changed = persistenceWarned;
    if(persistenceWarned){ persistenceWarned = false; state.saveError = null; }
    return changed;
  }catch(e){
    console.error('Opslaan mislukt', e);
    const changed = !persistenceWarned;
    if(!persistenceWarned){
      persistenceWarned = true;
      state.saveError = 'Automatisch opslaan werkt niet in deze browser. Klik hieronder op "Bewaren & laden" om je reisplannen zelf te bewaren.';
    }
    return changed;
  }
}
function saveTrips(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    if(persistTripsNow()) render();
  }, 300);
}

/* ---------- weather fetching (direct Open-Meteo, no key needed) ---------- */
function findStopById(stopId){
  for(const trip of state.trips){
    const s = trip.stops.find(x=>x.id===stopId);
    if(s) return s;
  }
  return null;
}
const VC_ICON_MAP = {
  'clear-day':['sun','Zonnig'], 'clear-night':['sun','Helder'],
  'partly-cloudy-day':['partly','Half bewolkt'], 'partly-cloudy-night':['partly','Half bewolkt'],
  'cloudy':['cloud','Bewolkt'], 'wind':['cloud','Winderig'], 'fog':['fog','Mist'],
  'rain':['rain','Regen'], 'showers-day':['rain','Buien'], 'showers-night':['rain','Buien'],
  'snow':['snow','Sneeuw'], 'snow-showers-day':['snow','Sneeuwbuien'], 'snow-showers-night':['snow','Sneeuwbuien'], 'sleet':['snow','Natte sneeuw'],
  'thunder':['storm','Onweer'], 'thunder-rain':['storm','Onweer'], 'thunder-showers-day':['storm','Onweer'], 'thunder-showers-night':['storm','Onweer']
};
function vcIconInfo(icon){ return VC_ICON_MAP[icon] || ['cloud','Onbekend']; }

function ensureWeather(stop){
  if(!stop.lat || !stop.lon || !stop.arrival || !stop.departure) return;
  const key = stop.id+'|'+stop.lat+','+stop.lon+'|'+stop.arrival+'|'+stop.departure+'|'+state.settings.provider+'|'+(state.settings.provider==='visualcrossing'?state.settings.vcKey:'');
  const cached = weatherCache[stop.id];
  if(cached && cached.key===key) return;
  weatherCache[stop.id] = { key, status:'loading', days:null };
  fetchWeather(stop, key);
}
async function fetchWeather(stop, key){
  const fullDays = dateRangeArr(stop.arrival, stop.departure);
  const provider = state.settings.provider;
  const fetchStart = stop.arrival < TODAY_ISO ? TODAY_ISO : stop.arrival;
  // Open-Meteo's forecast window is a hard ~16 days. Visual Crossing fills dates
  // beyond its ~15-day forecast with long-range statistical averages automatically,
  // so its range isn't capped the same way — see the "approx" flag below.
  const fetchEnd = (provider==='visualcrossing')
    ? stop.departure
    : (stop.departure > HORIZON_ISO ? HORIZON_ISO : stop.departure);
  const apiDays = {};
  if(fetchStart <= fetchEnd){
    try{
      if(provider === 'visualcrossing'){
        const apiKey = (state.settings.vcKey||'').trim();
        if(!apiKey) throw new Error('Geen API-sleutel ingesteld voor Visual Crossing');
        const url = 'https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/'+stop.lat+','+stop.lon+'/'+fetchStart+'/'+fetchEnd
          +'?key='+encodeURIComponent(apiKey)+'&unitGroup=metric&include=days&elements=datetime,tempmax,tempmin,precipprob,icon,source&contentType=json';
        const res = await fetch(url);
        if(!res.ok) throw new Error('bad response '+res.status);
        const data = await res.json();
        (data.days||[]).forEach(d=>{
          if(!d || !d.datetime) return;
          const info = vcIconInfo(d.icon);
          apiDays[d.datetime] = {
            iconKey: info[0], label: info[1],
            tmax: d.tempmax, tmin: d.tempmin, precip: d.precipprob,
            approx: d.source==='stats' || d.source==='statsfcst'
          };
        });
      } else {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude='+stop.lat+'&longitude='+stop.lon+
          '&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto'+
          '&start_date='+fetchStart+'&end_date='+fetchEnd;
        const res = await fetch(url);
        if(!res.ok) throw new Error('bad response');
        const data = await res.json();
        const t = data.daily.time;
        for(let i=0;i<t.length;i++){
          const info = weatherInfo(data.daily.weathercode[i]);
          apiDays[t[i]] = {
            iconKey: info[0], label: info[1],
            tmax: data.daily.temperature_2m_max[i],
            tmin: data.daily.temperature_2m_min[i],
            precip: data.daily.precipitation_probability_max ? data.daily.precipitation_probability_max[i] : null,
            approx: false
          };
        }
      }
    }catch(e){
      if(weatherCache[stop.id] && weatherCache[stop.id].key===key){
        weatherCache[stop.id] = { key, status:'error', days:null };
        updateWeatherDom(stop.id);
      }
      return;
    }
  }
  const days = fullDays.map(d=>{
    if(apiDays[d]) return Object.assign({date:d, kind:'ok'}, apiDays[d]);
    if(d < TODAY_ISO) return {date:d, kind:'past'};
    if(provider!=='visualcrossing' && d > HORIZON_ISO) return {date:d, kind:'future'};
    return {date:d, kind:'unknown'};
  });
  if(weatherCache[stop.id] && weatherCache[stop.id].key===key){
    weatherCache[stop.id] = { key, status:'ok', days };
    updateWeatherDom(stop.id);
  }
}
function updateWeatherDom(stopId){
  const el = document.getElementById('weather-'+stopId);
  if(el) el.outerHTML = renderWeatherBlock(stopId);
}

/* ---------- app actions ---------- */
const App = {};
window.App = App;

App.newTrip = function(){
  const trip = { id: uid(), name:'Nieuw reisplan', stops: [] };
  state.trips.unshift(trip);
  state.selectedTripId = trip.id;
  state.mode = 'edit';
  saveTrips(); render();
};
App.viewTrip = function(id){ state.selectedTripId = id; state.mode = 'view'; render(); };
App.editTrip = function(id){ state.selectedTripId = id; state.mode = 'edit'; render(); };
App.saveAndCloseTrip = function(tripId){
  clearTimeout(saveTimer);
  persistTripsNow();
  state.mode = 'view';
  state.saveConfirmation = 'Reisplan opgeslagen';
  render();
  clearTimeout(saveConfirmTimer);
  saveConfirmTimer = setTimeout(()=>{ state.saveConfirmation = null; render(); }, 2200);
};
App.askDeleteTrip = function(id){ state.confirmDeleteTripId = id; render(); };
App.cancelDeleteTrip = function(){ state.confirmDeleteTripId = null; render(); };
App.confirmDeleteTrip = function(id){
  state.trips = state.trips.filter(t=>t.id!==id);
  if(state.selectedTripId===id){
    state.selectedTripId = state.trips[0] ? state.trips[0].id : null;
    state.mode = 'view';
  }
  state.confirmDeleteTripId = null;
  saveTrips(); render();
};
App.renameTripInput = function(id, value){
  const trip = state.trips.find(t=>t.id===id); if(!trip) return;
  trip.name = value;
  const el = document.getElementById('sidebar-name-'+id);
  if(el) el.textContent = value || 'Naamloos reisplan';
  saveTrips();
};
App.addStop = function(tripId){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  const prev = trip.stops[trip.stops.length-1];
  const startDate = (prev && prev.departure) ? prev.departure : TODAY_ISO;
  trip.stops.push({ id: uid(), query:'', name:'', lat:null, lon:null, arrival:startDate, departure:startDate });
  saveTrips(); render();
};
App.removeStop = function(tripId, stopId){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  trip.stops = trip.stops.filter(s=>s.id!==stopId);
  delete weatherCache[stopId];
  saveTrips(); render();
};
App.moveStop = function(tripId, stopId, dir){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  const idx = trip.stops.findIndex(s=>s.id===stopId);
  const swap = idx+dir;
  if(swap<0 || swap>=trip.stops.length) return;
  const tmp = trip.stops[idx]; trip.stops[idx]=trip.stops[swap]; trip.stops[swap]=tmp;
  saveTrips(); render();
};
App.updateStopDate = function(tripId, stopId, field, value){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  const stop = trip.stops.find(s=>s.id===stopId); if(!stop) return;
  stop[field] = value;
  if(stop.arrival && stop.departure && stop.departure < stop.arrival){
    if(field==='arrival') stop.departure = value; else stop.arrival = value;
  }
  delete weatherCache[stopId];
  saveTrips(); render();
};
App.onSearchInput = function(tripId, stopId, value){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  const stop = trip.stops.find(s=>s.id===stopId); if(!stop) return;
  stop.query = value;
  saveTrips();
  const box = document.getElementById('sugg-'+stopId);
  if(!searchState[stopId]) searchState[stopId] = {timer:null, seq:0};
  clearTimeout(searchState[stopId].timer);
  if(!value || value.trim().length<2){ if(box) box.innerHTML=''; return; }
  searchState[stopId].timer = setTimeout(()=>doSearch(tripId, stopId, value), 350);
};
async function doSearch(tripId, stopId, q){
  const mySeq = ++searchState[stopId].seq;
  const box = document.getElementById('sugg-'+stopId);
  if(box) box.innerHTML = '<div class="sugg-empty">Zoeken…</div>';
  try{
    const url = 'https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=5&language=nl&format=json';
    const res = await fetch(url);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    if(mySeq !== searchState[stopId].seq) return;
    if(!box) return;
    const results = (data.results||[]).map(r=>({
      name: [r.name, r.admin1, r.country].filter(Boolean).join(', '),
      lat: r.latitude, lon: r.longitude
    }));
    lastSuggestions[stopId] = results;
    if(!results.length){ box.innerHTML = '<div class="sugg-empty">Geen plaatsen gevonden</div>'; return; }
    box.innerHTML = results.map((r,i)=>
      '<button type="button" onclick="App.pickPlace(\''+tripId+'\',\''+stopId+'\','+i+')">'+escHtml(r.name)+'</button>'
    ).join('');
  }catch(e){
    if(mySeq !== searchState[stopId].seq) return;
    if(box) box.innerHTML = '<div class="sugg-empty">Kon niet zoeken. Controleer je internetverbinding.</div>';
  }
}
App.pickPlace = function(tripId, stopId, idx){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  const stop = trip.stops.find(s=>s.id===stopId); if(!stop) return;
  const picked = (lastSuggestions[stopId]||[])[idx]; if(!picked) return;
  stop.name = picked.name; stop.lat = picked.lat; stop.lon = picked.lon; stop.query = picked.name;
  delete weatherCache[stopId];
  saveTrips(); render();
};
App.retryWeather = function(stopId){ delete weatherCache[stopId]; render(); };
App.dismissSaveError = function(){ state.saveError = null; render(); };

App.openBackupPanel = function(){ state.showBackupPanel = true; state.showSettingsPanel = false; state.importFeedback = null; render(); };
App.closeBackupPanel = function(){ state.showBackupPanel = false; render(); };

App.openSettings = function(){ state.showSettingsPanel = true; state.showBackupPanel = false; render(); };
App.closeSettings = function(){
  state.showSettingsPanel = false;
  // settings may have changed — force a fresh fetch under whatever is active now
  Object.keys(weatherCache).forEach(k=>delete weatherCache[k]);
  render();
};
App.setProvider = function(id){
  if(id!=='openmeteo' && id!=='visualcrossing') return;
  state.settings.provider = id;
  saveSettingsState();
  render();
};
App.setVcKey = function(value){
  state.settings.vcKey = value;
  saveSettingsState();
};

App.exportTrips = function(){
  // Best-effort automatic download. Some sandboxed views block this silently,
  // which is why the modal always also offers a manual copy as a fallback.
  try{
    if(typeof URL.createObjectURL !== 'function') return;
    const data = JSON.stringify(state.trips, null, 2);
    const blob = new Blob([data], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'reisweer-reisplannen.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }catch(e){ /* silently ignore — manual copy stays available in the same panel */ }
};

App.copyExportText = function(){
  const ta = document.getElementById('export-textarea');
  if(!ta) return;
  ta.focus();
  ta.select();
  try{ ta.setSelectionRange(0, 999999); }catch(e){}
  let copied = false;
  try{ copied = document.execCommand('copy'); }catch(e){}
  if(!copied && navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(ta.value).catch(()=>{});
  }
  const btn = document.getElementById('copy-export-btn');
  if(btn){
    const orig = btn.textContent;
    btn.textContent = 'Gekopieerd ✓';
    setTimeout(()=>{ if(btn) btn.textContent = orig; }, 1500);
  }
};

App.applyImportedJson = function(text){
  try{
    const parsed = JSON.parse(text);
    if(!Array.isArray(parsed)) throw new Error('geen lijst');
    const valid = parsed.every(t=>t && typeof t==='object' && typeof t.id==='string' && Array.isArray(t.stops));
    if(!valid) throw new Error('onverwachte vorm');
    state.trips = parsed;
    state.selectedTripId = parsed.length ? parsed[0].id : null;
    Object.keys(weatherCache).forEach(k=>delete weatherCache[k]);
    state.showBackupPanel = false;
    state.importFeedback = null;
    saveTrips();
    render();
  }catch(e){
    state.importFeedback = 'Kon dit niet inlezen — controleer of het de volledige, ongewijzigde tekst van een eerdere export is.';
    render();
  }
};
App.loadFromPastedText = function(){
  const ta = document.getElementById('import-textarea');
  if(!ta) return;
  App.applyImportedJson(ta.value);
};
App.handleImportFile = function(evt){
  const input = evt.target;
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){ App.applyImportedJson(String(reader.result)); };
  reader.onerror = function(){ state.importFeedback = 'Kon het bestand niet lezen.'; render(); };
  reader.readAsText(file);
  input.value = '';
};
App.clearAllAsk = function(){ state.confirmClearAll = true; render(); };
App.clearAllCancel = function(){ state.confirmClearAll = false; render(); };
App.clearAllConfirm = function(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  state.trips = []; state.selectedTripId = null; state.confirmClearAll = false;
  render();
};

/* ---------- render ---------- */
function tripRangeLabel(trip){
  if(!trip.stops.length) return '';
  const starts = trip.stops.map(s=>s.arrival).filter(Boolean).sort();
  const ends = trip.stops.map(s=>s.departure).filter(Boolean).sort();
  if(!starts.length || !ends.length) return '';
  return formatRangeLabel(starts[0], ends[ends.length-1]);
}

function renderWeatherBlock(stopId){
  const stop = findStopById(stopId);
  if(!stop) return '';
  if(!stop.lat || !stop.lon){
    return '<div id="weather-'+stopId+'" class="weather-status">Zoek en kies een plaats om het weer te zien.</div>';
  }
  const cache = weatherCache[stopId];
  if(!cache || cache.status==='loading'){
    return '<div id="weather-'+stopId+'" class="weather-status">Weer laden…</div>';
  }
  if(cache.status==='error'){
    const noKey = state.settings.provider==='visualcrossing' && !(state.settings.vcKey||'').trim();
    const msg = noKey
      ? 'Geen Visual Crossing API-sleutel ingesteld. <button type="button" class="mini-btn" onclick="App.openSettings()">Naar instellingen</button>'
      : 'Kon het weer niet ophalen. <button type="button" class="mini-btn" onclick="App.retryWeather(\''+stopId+'\')">Opnieuw</button>';
    return '<div id="weather-'+stopId+'" class="weather-status">'+msg+'</div>';
  }
  const hasApprox = cache.days.some(d=>d.kind==='ok' && d.approx);
  const chips = cache.days.map(d=>{
    const isToday = d.date===TODAY_ISO;
    if(d.kind==='ok'){
      const precip = (typeof d.precip==='number' && d.precip>=20)
        ? '<span class="precip">'+Math.round(d.precip)+'%</span>' : '';
      const tilde = d.approx ? '~' : '';
      return '<div class="day-chip'+(isToday?' is-today':'')+(d.approx?' is-approx':'')+'">'
        +'<div class="day-label">'+formatDayLabel(d.date)+'</div>'
        +iconSvg(d.iconKey)
        +'<div class="temps"><span class="t-max">'+tilde+fmtTemp(d.tmax)+'</span> <span class="t-min">'+tilde+fmtTemp(d.tmin)+'</span></div>'
        +'<div class="desc">'+d.label+'</div>'
        +precip+'</div>';
    }
    const msg = d.kind==='future' ? 'Nog te ver vooruit' : d.kind==='past' ? 'Verstreken' : 'Onbekend';
    return '<div class="day-chip placeholder'+(isToday?' is-today':'')+'">'
      +'<div class="day-label">'+formatDayLabel(d.date)+'</div>'
      +'<div class="desc">'+msg+'</div></div>';
  }).join('');
  const legend = hasApprox ? '<p class="modal-hint" style="margin:6px 0 0;">~ = langjarig gemiddelde (statistisch), geen harde voorspelling.</p>' : '';
  return '<div id="weather-'+stopId+'"><div class="weather-row">'+chips+'</div>'+legend+'</div>';
}

function renderStopRow(trip, stop, index){
  const isFirst = index===0, isLast = index===trip.stops.length-1;
  const dateWarn = (stop.arrival && stop.departure && stop.departure < stop.arrival)
    ? '<div class="warn">Vertrek ligt voor aankomst</div>' : '';
  return '<div class="stop-row">'
    +'<div class="marker-col"><div class="marker-dot">'+(index+1)+'</div></div>'
    +'<div class="stop-card">'
      +'<div class="stop-card-top">'
        +'<div class="search-wrap field">'
          +'<label for="place-'+stop.id+'">Plaats</label>'
          +'<input id="place-'+stop.id+'" type="text" placeholder="Zoek een plaats…" value="'+escAttr(stop.query||stop.name||'')+'" '
          +'oninput="App.onSearchInput(\''+trip.id+'\',\''+stop.id+'\', this.value)" autocomplete="off" />'
          +'<div class="suggestions" id="sugg-'+stop.id+'"></div>'
        +'</div>'
        +'<div class="field"><label for="arr-'+stop.id+'">Aankomst</label>'
          +'<input id="arr-'+stop.id+'" type="date" value="'+(stop.arrival||'')+'" '
          +'onchange="App.updateStopDate(\''+trip.id+'\',\''+stop.id+'\',\'arrival\', this.value)" /></div>'
        +'<div class="field"><label for="dep-'+stop.id+'">Vertrek</label>'
          +'<input id="dep-'+stop.id+'" type="date" value="'+(stop.departure||'')+'" min="'+(stop.arrival||'')+'" '
          +'onchange="App.updateStopDate(\''+trip.id+'\',\''+stop.id+'\',\'departure\', this.value)" /></div>'
        +'<div class="stop-actions">'
          +'<button type="button" class="icon-btn" title="Omhoog"'+(isFirst?' disabled style="opacity:.3"':'')+' onclick="App.moveStop(\''+trip.id+'\',\''+stop.id+'\',-1)">'
            +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
          +'<button type="button" class="icon-btn" title="Omlaag"'+(isLast?' disabled style="opacity:.3"':'')+' onclick="App.moveStop(\''+trip.id+'\',\''+stop.id+'\',1)">'
            +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
          +'<button type="button" class="icon-btn" title="Stop verwijderen" onclick="App.removeStop(\''+trip.id+'\',\''+stop.id+'\')">'
            +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0-1 13a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1L6 7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
        +'</div>'
      +'</div>'
      +dateWarn
      +renderWeatherBlock(stop.id)
    +'</div>'
  +'</div>';
}

function renderSidebar(){
  if(state.loading){
    return '<div class="sidebar"><p class="sidebar-title">Reisplannen</p><div class="weather-status">Laden…</div></div>';
  }
  const items = state.trips.map(t=>{
    const active = t.id===state.selectedTripId;
    const range = tripRangeLabel(t);
    return '<li class="trip-item'+(active?' active':'')+'">'
      +'<button type="button" class="trip-select" onclick="App.viewTrip(\''+t.id+'\')">'
        +'<span id="sidebar-name-'+t.id+'">'+escHtml(t.name||'Naamloos reisplan')+'</span>'
        +'<span class="trip-meta">'+t.stops.length+' stop'+(t.stops.length===1?'':'s')+(range?' · '+range:'')+'</span>'
      +'</button>'
      +'<button type="button" class="icon-btn" title="Bewerken" onclick="App.editTrip(\''+t.id+'\')">'
        +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
    +'</li>';
  }).join('');
  const dataNote = '<p style="font-size:11px;color:var(--ink-soft);line-height:1.4;margin:0 0 10px;">Zoeken en weer vereisen een actieve internetverbinding.</p>';
  const footer = state.trips.length ? (
    state.confirmClearAll
      ? '<div class="confirm-row">Alles wissen?'
        +'<button type="button" class="mini-btn" onclick="App.clearAllConfirm()">Ja</button>'
        +'<button type="button" class="mini-btn" onclick="App.clearAllCancel()">Nee</button></div>'
      : '<button type="button" class="text-link" onclick="App.clearAllAsk()">Alle reisplannen wissen</button>'
  ) : '';
  return '<div class="sidebar">'
    +'<p class="sidebar-title">Reisplannen</p>'
    +'<ul class="trip-list">'+items+'</ul>'
    +'<button type="button" class="new-trip-btn" onclick="App.newTrip()">'
      +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>'
      +'Nieuw reisplan</button>'
    +'<div class="sidebar-foot">'+dataNote
      +(footer?'<div style="margin-top:10px;">'+footer+'</div>':'')
    +'</div>'
  +'</div>';
}

function renderMain(){
  if(state.loading) return '<div class="main"></div>';
  if(!state.trips.length){
    return '<div class="main"><div class="empty-state">'
      +'<div class="display">Nog geen reisplannen</div>'
      +'<p>Maak je eerste rondreis en zie het weer voor elke stop in één overzicht — zonder te switchen tussen plaatsen.</p>'
      +'<button type="button" class="btn btn-primary" onclick="App.newTrip()">+ Nieuw reisplan</button>'
    +'</div></div>';
  }
  let trip = state.trips.find(t=>t.id===state.selectedTripId);
  if(!trip){ trip = state.trips[0]; state.selectedTripId = trip.id; }
  return state.mode==='edit' ? renderTripEdit(trip) : renderTripView(trip);
}

function renderTripEdit(trip){
  const stopsHtml = trip.stops.length
    ? trip.stops.map((s,i)=>renderStopRow(trip, s, i)).join('')
    : '<p style="color:var(--ink-soft);font-size:13.5px;">Nog geen stops. Voeg je eerste plaats toe.</p>';
  const range = tripRangeLabel(trip);
  const deleteControl = state.confirmDeleteTripId===trip.id
    ? '<div class="confirm-row">Verwijderen?'
      +'<button type="button" class="mini-btn" onclick="App.confirmDeleteTrip(\''+trip.id+'\')">Ja</button>'
      +'<button type="button" class="mini-btn" onclick="App.cancelDeleteTrip()">Nee</button></div>'
    : '<button type="button" class="btn-danger-outline" onclick="App.askDeleteTrip(\''+trip.id+'\')">Verwijderen</button>';
  return '<div class="main">'
    +'<div class="trip-header">'
      +'<div style="flex:1;min-width:0;">'
        +'<input type="text" class="trip-name-input" value="'+escAttr(trip.name)+'" '
        +'oninput="App.renameTripInput(\''+trip.id+'\', this.value)" aria-label="Naam reisplan" />'
        +'<div class="trip-sub">'+trip.stops.length+' stop'+(trip.stops.length===1?'':'s')+(range?' · '+range:'')+'</div>'
      +'</div>'
      +'<div class="trip-header-actions">'+deleteControl+'</div>'
    +'</div>'
    +'<div class="stops-list">'+stopsHtml+'</div>'
    +'<div class="edit-actions-row">'
      +'<button type="button" class="add-stop-btn" onclick="App.addStop(\''+trip.id+'\')">'
        +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>'
        +'Stop toevoegen</button>'
      +'<button type="button" class="btn btn-primary" onclick="App.saveAndCloseTrip(\''+trip.id+'\')">'
        +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:5px;"><path d="M5 12.5l4.5 4.5L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        +'Reisplan bewaren</button>'
    +'</div>'
  +'</div>';
}

function renderTripView(trip){
  const range = tripRangeLabel(trip);
  const stopsHtml = trip.stops.length
    ? trip.stops.map((s,i)=>renderStopView(trip, s, i)).join('')
    : '<div class="empty-state" style="padding:40px 10px;">'
      +'<p style="color:var(--ink-soft);font-size:14px;margin:0 0 16px;">Dit reisplan heeft nog geen stops.</p>'
      +'<button type="button" class="btn btn-primary" onclick="App.editTrip(\''+trip.id+'\')">Stops toevoegen</button>'
    +'</div>';
  return '<div class="main">'
    +'<div class="trip-header-view">'
      +'<h2 class="display trip-view-title">'+escHtml(trip.name||'Naamloos reisplan')+'</h2>'
      +'<div class="trip-sub">'+trip.stops.length+' stop'+(trip.stops.length===1?'':'s')+(range?' · '+range:'')+'</div>'
    +'</div>'
    +'<div class="stops-list">'+stopsHtml+'</div>'
  +'</div>';
}

function renderStopView(trip, stop, index){
  return '<div class="stop-row">'
    +'<div class="marker-col"><div class="marker-dot">'+(index+1)+'</div></div>'
    +'<div class="stop-card">'
      +'<div class="stop-view-head">'
        +'<h3 class="stop-view-name">'+escHtml(stop.name||'Onbekende plaats')+'</h3>'
        +'<div class="stop-view-dates mono">'+formatRangeLabel(stop.arrival, stop.departure)+'</div>'
      +'</div>'
      +renderWeatherBlock(stop.id)
    +'</div>'
  +'</div>';
}

function renderSaveErrorBanner(){
  if(!state.saveError) return '';
  return '<div class="save-error-banner"><span>'+escHtml(state.saveError)+'</span>'
    +'<button type="button" onclick="App.dismissSaveError()" aria-label="Melding sluiten">×</button></div>';
}

function renderSaveConfirmationBanner(){
  if(!state.saveConfirmation) return '';
  return '<div class="save-ok-banner"><span>✓ '+escHtml(state.saveConfirmation)+'</span></div>';
}

function renderBackupModal(){
  if(!state.showBackupPanel) return '';
  const json = JSON.stringify(state.trips, null, 2);
  const feedback = state.importFeedback ? '<p class="warn" style="margin:8px 0 0;">'+escHtml(state.importFeedback)+'</p>' : '';
  return '<div class="modal-overlay" onclick="if(event.target===this){App.closeBackupPanel();}">'
    +'<div class="modal-card">'
      +'<div class="modal-head"><h3>Reisplannen bewaren &amp; laden</h3>'
        +'<button type="button" class="icon-btn" onclick="App.closeBackupPanel()" aria-label="Sluiten">'
          +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg></button>'
      +'</div>'
      +'<p class="modal-sub">Automatisch opslaan werkt niet in elke weergave. Bewaar je reisplannen hieronder als bestand of tekst, en laad ze later weer in — ook in een andere sessie.</p>'

      +'<h4>Bewaren</h4>'
      +'<button type="button" class="btn btn-primary" onclick="App.exportTrips()">⬇ Downloaden als bestand</button>'
      +'<p class="modal-hint">Lukt downloaden niet? Kopieer dan deze tekst en bewaar het zelf (bijv. in een notitie):</p>'
      +'<textarea id="export-textarea" class="modal-textarea" readonly onclick="this.select()">'+escHtml(json)+'</textarea>'
      +'<button type="button" id="copy-export-btn" class="mini-btn" onclick="App.copyExportText()">Kopieer tekst</button>'

      +'<h4 style="margin-top:18px;">Laden</h4>'
      +'<button type="button" class="btn" onclick="document.getElementById(\'import-file-input\').click()">📁 Bestand kiezen</button>'
      +'<input type="file" id="import-file-input" accept="application/json" style="display:none" onchange="App.handleImportFile(event)" />'
      +'<p class="modal-hint">Of plak hier eerder bewaarde tekst:</p>'
      +'<textarea id="import-textarea" class="modal-textarea" placeholder="Plak hier de tekst uit een eerdere export…"></textarea>'
      +'<button type="button" class="mini-btn" onclick="App.loadFromPastedText()">Laden</button>'
      +feedback
    +'</div>'
  +'</div>';
}

function renderSettingsModal(){
  if(!state.showSettingsPanel) return '';
  const s = state.settings;
  const vcSection = s.provider==='visualcrossing' ? (
    '<div style="margin-top:10px;">'
      +'<label style="font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);display:block;margin-bottom:4px;">Visual Crossing API-sleutel</label>'
      +'<input type="text" id="vc-key-input" value="'+escAttr(s.vcKey||'')+'" placeholder="Plak hier je gratis API-sleutel" '
        +'oninput="App.setVcKey(this.value)" style="width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:13px;font-family:\'IBM Plex Mono\',monospace;background:var(--paper);color:var(--ink);" />'
      +'<p class="modal-hint">Nodig om verder dan ~15 dagen vooruit te kunnen kijken. Gratis account: 1000 opvragingen/dag. '
        +'<a href="https://www.visualcrossing.com/sign-up" target="_blank" rel="noopener" style="color:var(--teal);">Sleutel aanmaken ↗</a><br>'
        +'Je sleutel wordt alleen lokaal in je browser bewaard en rechtstreeks naar Visual Crossing gestuurd — nergens anders naartoe.</p>'
    +'</div>'
  ) : '';
  return '<div class="modal-overlay" onclick="if(event.target===this){App.closeSettings();}">'
    +'<div class="modal-card">'
      +'<div class="modal-head"><h3>Instellingen</h3>'
        +'<button type="button" class="icon-btn" onclick="App.closeSettings()" aria-label="Sluiten">'
          +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg></button>'
      +'</div>'
      +'<h4>Weerdienst</h4>'
      +'<label class="provider-option"><input type="radio" name="provider" '+(s.provider==='openmeteo'?'checked':'')+' onchange="App.setProvider(\'openmeteo\')" />'
        +'<span><strong>Open-Meteo</strong> <span class="modal-hint" style="margin:2px 0 0;display:block;">Gratis, geen sleutel nodig. Betrouwbare voorspelling tot ~16 dagen vooruit.</span></span></label>'
      +'<label class="provider-option"><input type="radio" name="provider" '+(s.provider==='visualcrossing'?'checked':'')+' onchange="App.setProvider(\'visualcrossing\')" />'
        +'<span><strong>Visual Crossing</strong> <span class="modal-hint" style="margin:2px 0 0;display:block;">Eigen gratis sleutel nodig. Kijkt verder vooruit, maar dagen na ~15 dagen zijn een langjarig gemiddelde (zie ~), geen harde voorspelling.</span></span></label>'
      +vcSection
      +'<h4 style="margin-top:18px;">Gegevens</h4>'
      +'<button type="button" class="backup-btn" onclick="App.openBackupPanel()">'
        +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        +'Bewaren &amp; laden</button>'
      +'<p class="modal-hint">Reisplannen als bestand downloaden of als tekst kopiëren, en later weer inladen.</p>'
      +'<h4 style="margin-top:18px;">Over deze app</h4>'
      +'<p class="modal-hint" style="margin-top:0;">Broncode op <a href="https://github.com/bjornvaessen/reisweer" target="_blank" rel="noopener" style="color:var(--teal);">github.com/bjornvaessen/reisweer</a>.<br>'
        +'Open source onder de <a href="https://github.com/bjornvaessen/reisweer/blob/main/LICENSE" target="_blank" rel="noopener" style="color:var(--teal);">GNU GPLv3-licentie</a>.</p>'
    +'</div>'
  +'</div>';
}

function render(){
  const layout = document.getElementById('layout');
  layout.innerHTML = renderSaveErrorBanner() + renderSaveConfirmationBanner() + renderSidebar() + renderMain();
  const modalHost = document.getElementById('modal-host');
  if(modalHost) modalHost.innerHTML = renderBackupModal() + renderSettingsModal();
  const trip = state.trips.find(t=>t.id===state.selectedTripId);
  if(trip){ trip.stops.forEach(s=>ensureWeather(s)); }
}

loadSettings();
loadTrips();
</script>
</body>
</html>
