<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reisweer — weer voor je hele route</title>

<!-- Home-screen icon (iOS "Zet op beginscherm" + Android/Chrome) -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#186A72">
<meta name="apple-mobile-web-app-title" content="Reisweer">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF1EC;
    --card:#FFFFFF;
    --ink:#20262A;
    --ink-soft:#5B6663;
    --line:#CBD3C8;
    --amber:#E07C1E;
    --amber-soft:#F6E3CC;
    --teal:#186A72;
    --teal-soft:#D9EAE8;
    --violet:#5C4A87;
    --slate:#8B948F;
    --iceblue:#4C86B8;
    --danger:#B8402A;
    --danger-soft:#F5DCD5;
    --radius:10px;
    --shadow:0 1px 2px rgba(32,38,42,0.06), 0 4px 14px rgba(32,38,42,0.06);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,.display{ font-family:'IBM Plex Sans Condensed', sans-serif; font-weight:600; letter-spacing:0.01em; margin:0; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  button{ font-family:inherit; cursor:pointer; }
  input{ font-family:inherit; }
  button:focus-visible, input:focus-visible, a:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; }

  /* header */
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 20px; border-bottom:1px solid var(--line);
  }
  .topbar-brand{ display:flex; align-items:center; gap:12px; min-width:0; }
  .brand-mark{ width:38px; height:38px; flex-shrink:0; }
  .brand h1{ font-size:19px; line-height:1.1; }
  .brand p{ margin:2px 0 0; font-size:12.5px; color:var(--ink-soft); }
  .settings-btn{ flex-shrink:0; padding:8px; }

  /* layout */
  .layout{ max-width:1180px; margin:0 auto; }
  @media (min-width:880px){
    .layout{ display:grid; grid-template-columns:272px 1fr; align-items:start; }
  }

  /* sidebar */
  .sidebar{ padding:18px 16px; border-bottom:1px solid var(--line); }
  @media (min-width:880px){
    .sidebar{ border-bottom:none; border-right:1px solid var(--line); min-height:calc(100vh - 66px); position:sticky; top:0; }
  }
  .sidebar-title{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); margin:0 0 10px; }
  .trip-list{ list-style:none; margin:0 0 14px; padding:0; display:flex; flex-direction:column; gap:6px; }
  .trip-item{
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    padding:9px 10px; border-radius:var(--radius); border:1px solid transparent;
  }
  .trip-item.active{ background:var(--card); border-color:var(--line); box-shadow:var(--shadow); }
  .trip-select{ background:none; border:none; flex:1; min-width:0; text-align:left; padding:0; font-size:14px; color:var(--ink); }
  .trip-select span{ display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .trip-meta{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .icon-btn{ background:none; border:none; padding:5px; border-radius:6px; color:var(--ink-soft); display:flex; flex-shrink:0; }
  .icon-btn:hover{ background:var(--teal-soft); color:var(--teal); }
  .new-trip-btn{
    display:flex; align-items:center; gap:8px; width:100%;
    padding:9px 12px; border-radius:var(--radius); border:1px dashed var(--line);
    background:none; color:var(--teal); font-size:13.5px; font-weight:500;
  }
  .new-trip-btn:hover{ border-color:var(--teal); background:var(--teal-soft); }
  .confirm-row{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--danger); flex-wrap:wrap; }
  .mini-btn{ padding:3px 8px; font-size:11.5px; border-radius:6px; border:1px solid var(--line); background:var(--card); }
  .mini-btn:hover{ border-color:var(--teal); color:var(--teal); }
  .sidebar-foot{ margin-top:16px; padding-top:12px; border-top:1px solid var(--line); }
  .backup-btn{
    display:flex; align-items:center; gap:7px; width:100%;
    padding:8px 10px; border-radius:8px; border:1px solid var(--line); background:var(--card);
    color:var(--teal); font-size:13px; font-weight:500;
  }
  .backup-btn:hover{ border-color:var(--teal); background:var(--teal-soft); }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(32,38,42,0.45); z-index:50;
    display:flex; align-items:center; justify-content:center; padding:16px;
  }
  .modal-card{
    background:var(--card); border-radius:12px; max-width:480px; width:100%;
    max-height:88vh; overflow-y:auto; padding:18px 20px 20px; box-shadow:0 8px 30px rgba(0,0,0,0.25);
  }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px; }
  .modal-head h3{ font-size:17px; }
  .day-nav{ display:flex; align-items:center; gap:2px; min-width:0; flex:1; }
  .day-nav h3{ font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .day-nav-btn{ flex-shrink:0; }
  .day-nav-btn[disabled]{ opacity:0.25; cursor:default; }
  .day-nav-btn[disabled]:hover{ background:none; color:var(--ink-soft); }
  .modal-sub{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin:0 0 14px; }
  .modal-card h4{ font-family:'IBM Plex Sans Condensed', sans-serif; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:var(--ink-soft); margin:0 0 8px; }
  .modal-hint{ font-size:12px; color:var(--ink-soft); margin:8px 0 6px; }
  .modal-textarea{
    width:100%; min-height:80px; resize:vertical; border:1px solid var(--line); border-radius:7px;
    padding:8px 9px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink); background:var(--paper);
    margin-bottom:8px;
  }
  .provider-option{ display:flex; gap:9px; align-items:flex-start; padding:9px 0; border-bottom:1px solid var(--line); cursor:pointer; font-size:13.5px; }
  .provider-option:last-of-type{ border-bottom:none; }
  .provider-option input{ margin-top:3px; flex-shrink:0; }
  .text-link{ background:none; border:none; padding:0; font-size:12px; color:var(--ink-soft); text-decoration:underline; }
  .text-link:hover{ color:var(--danger); }

  .detail-top{ display:flex; align-items:center; gap:12px; margin:6px 0 14px; }
  .detail-top .day-icon{ width:52px; height:52px; margin:0; flex-shrink:0; }
  .detail-temp-big{ font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600; color:var(--ink); }
  .detail-temp-big .t-min{ font-weight:400; font-size:16px; }
  .detail-grid{ display:flex; flex-direction:column; }
  .detail-row{ display:flex; justify-content:space-between; gap:12px; padding:7px 0; border-bottom:1px solid var(--line); font-size:13px; }
  .detail-row:last-child{ border-bottom:none; }
  .detail-label{ color:var(--ink-soft); }
  .detail-value{ font-family:'IBM Plex Mono',monospace; color:var(--ink); text-align:right; }
  .hourly-chart{ width:100%; height:auto; display:block; margin-top:4px; }
  .chart-legend{ display:flex; gap:16px; font-size:11px; color:var(--ink-soft); margin-top:4px; }
  .chart-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .legend-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  .legend-temp{ background:var(--amber); }
  .legend-precip{ background:var(--teal-soft); border:1px solid var(--teal); }

  .risk-row{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; margin-bottom:12px; background:var(--danger-soft); border:1px solid var(--danger); }
  .badge-circle{ width:38px; height:38px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--danger); }
  .badge-circle svg{ width:26px; height:26px; }
  .risk-text{ font-size:12.5px; line-height:1.4; }
  .risk-text strong{ color:var(--danger); }

  .toggle-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); }
  .toggle-row:last-of-type{ border-bottom:none; }
  .t-lbl{ font-size:13.5px; font-weight:500; }
  .t-sub{ font-size:12px; color:var(--ink-soft); margin-top:3px; line-height:1.5; }
  .switch{ width:36px; height:20px; border-radius:20px; flex-shrink:0; position:relative; border:none; padding:0; cursor:pointer; }
  .switch.on{ background:var(--teal); }
  .switch.off{ background:var(--line); }
  .switch::after{ content:''; position:absolute; top:2px; width:16px; height:16px; border-radius:50%; background:#fff; }
  .switch.on::after{ right:2px; }
  .switch.off::after{ left:2px; }

  .aqi-hero{ display:flex; align-items:center; gap:14px; border-radius:10px; padding:12px 14px; margin-top:8px; }
  .aqi-hero-good, .aqi-hero-moderate{ background:var(--teal-soft); border:1px solid var(--teal); }
  .aqi-hero-usg{ background:#F5D9BE; border:1px solid #9A4A00; }
  .aqi-hero-unhealthy{ background:var(--danger-soft); border:1px solid var(--danger); }
  .aqi-hero-veryunhealthy{ background:#E4D9F0; border:1px solid var(--violet); }
  .aqi-num{ font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:600; line-height:1; }
  .aqi-num-lbl{ display:block; font-size:10px; font-weight:400; text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }
  .aqi-desc{ font-size:12.5px; line-height:1.5; }
  .fire-link{ font-size:12px; color:var(--teal); margin-top:8px; display:inline-block; }

  /* main */
  .main{ padding:20px 20px 60px; }
  .empty-state{ text-align:center; padding:56px 20px; color:var(--ink-soft); }
  .empty-state .display{ font-size:19px; color:var(--ink); margin-bottom:6px; }
  .empty-state p{ max-width:360px; margin:0 auto 18px; font-size:14px; line-height:1.5; }

  .trip-header{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:18px; }
  .trip-header-actions{ flex-shrink:0; padding-top:2px; }
  .trip-name-input{
    font-family:'IBM Plex Sans Condensed', sans-serif; font-weight:600; font-size:25px;
    border:1px solid transparent; background:none; padding:3px 6px; margin:0 0 0 -6px; border-radius:7px; color:var(--ink);
    max-width:100%; width:100%;
  }
  .trip-name-input:hover{ border-color:var(--line); }
  .trip-name-input:focus{ border-color:var(--teal); background:var(--card); outline:none; }
  .trip-sub{ font-size:12.5px; color:var(--ink-soft); margin-top:4px; }
  .trip-header-view{ margin-bottom:18px; }
  .trip-view-title{ font-size:25px; }

  .btn{ border-radius:8px; padding:8px 14px; font-size:13.5px; font-weight:500; border:1px solid var(--line); background:var(--card); }
  .btn:hover{ border-color:var(--teal); color:var(--teal); }
  .btn-primary{ background:var(--teal); border-color:var(--teal); color:#fff; }
  .btn-primary:hover{ background:#145258; color:#fff; }
  .btn-danger-outline{ background:none; border:1px solid var(--danger); color:var(--danger); border-radius:8px; padding:7px 12px; font-size:12.5px; font-weight:500; }
  .btn-danger-outline:hover{ background:var(--danger-soft); }

  /* stops timeline */
  .stops-list{ display:flex; flex-direction:column; }
  .stop-row{ display:grid; grid-template-columns:34px 1fr; gap:10px; position:relative; padding-bottom:20px; }
  .stop-row:last-child{ padding-bottom:0; }
  .marker-col{ position:relative; display:flex; justify-content:center; }
  .marker-dot{
    width:26px; height:26px; border-radius:50%; background:var(--card); border:2px solid var(--teal);
    color:var(--teal); font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:600;
    display:flex; align-items:center; justify-content:center; z-index:1;
  }
  .stop-row:not(:last-child) .marker-col::after{
    content:''; position:absolute; top:27px; left:50%; transform:translateX(-50%);
    width:2px; height:calc(100% - 7px);
    background-image:linear-gradient(var(--teal) 55%, transparent 0%);
    background-size:2px 9px; background-repeat:repeat-y; opacity:0.5;
  }

  .stop-card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow); }
  .stop-card-top{ display:flex; flex-wrap:wrap; gap:10px 14px; align-items:flex-end; margin-bottom:12px; }
  .stop-view-head{ display:flex; flex-wrap:wrap; align-items:baseline; justify-content:space-between; gap:6px 14px; margin-bottom:12px; }
  .stop-view-name{ font-size:17px; }
  .stop-view-dates{ font-size:12px; color:var(--ink-soft); }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{ font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-soft); }
  .field input[type=text], .field input[type=date]{
    border:1px solid var(--line); border-radius:7px; padding:7px 9px; font-size:13.5px; color:var(--ink); background:var(--paper);
    min-width:0;
  }
  .search-wrap{ position:relative; flex:1 1 200px; min-width:180px; }
  .suggestions{
    position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--card); border:1px solid var(--line);
    border-radius:8px; box-shadow:var(--shadow); z-index:5; max-height:220px; overflow-y:auto;
  }
  .suggestions button{ display:block; width:100%; text-align:left; padding:8px 10px; border:none; background:none; font-size:13px; color:var(--ink); border-bottom:1px solid var(--line); }
  .suggestions button:last-child{ border-bottom:none; }
  .suggestions button:hover{ background:var(--teal-soft); }
  .sugg-empty{ padding:8px 10px; font-size:12.5px; color:var(--ink-soft); }

  .stop-actions{ display:flex; gap:2px; margin-left:auto; }

  /* weather chips */
  .weather-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .day-chip{
    width:80px; flex-shrink:0; border:1px solid var(--line); border-radius:8px; padding:8px 4px; text-align:center;
    background:var(--paper); font-family:inherit; color:inherit; margin:0; appearance:none; -webkit-appearance:none;
  }
  .day-chip.is-today{ border-color:var(--amber); background:var(--amber-soft); }
  .day-chip.is-approx{ border-style:dashed; }
  .day-chip .day-label{ font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; color:var(--ink-soft); }
  .day-icon, .day-icon-spacer{ width:34px; height:34px; margin:4px auto; display:block; }
  .temps{ font-family:'IBM Plex Mono',monospace; font-size:13px; }
  .t-max{ font-weight:600; color:var(--ink); }
  .t-min{ color:var(--ink-soft); }
  .precip{ margin-top:4px; display:inline-block; font-size:10px; font-family:'IBM Plex Mono',monospace; background:var(--teal-soft); color:var(--teal); border-radius:20px; padding:1px 6px; }
  .uv-badge{ display:none; font-size:10px; font-family:'IBM Plex Mono',monospace; border-radius:20px; padding:1px 6px; }
  .uv-badge.uv-low{ background:var(--teal-soft); color:var(--teal); }
  .uv-badge.uv-mid{ background:var(--amber-soft); color:#7A4300; }
  .uv-badge.uv-high{ background:#F5D9BE; color:#9A4A00; }
  .uv-badge.uv-vhigh{ background:var(--danger-soft); color:var(--danger); }
  .uv-badge.uv-extreme{ background:#E4D9F0; color:var(--violet); }
  .aqi-badge{ display:none; font-size:10px; font-family:'IBM Plex Mono',monospace; border-radius:20px; padding:1px 6px; }
  .aqi-badge.aqi-good{ background:var(--teal-soft); color:var(--teal); }
  .aqi-badge.aqi-moderate{ background:var(--amber-soft); color:#7A4300; }
  .aqi-badge.aqi-usg{ background:#F5D9BE; color:#9A4A00; }
  .aqi-badge.aqi-unhealthy{ background:var(--danger-soft); color:var(--danger); }
  .aqi-badge.aqi-veryunhealthy{ background:#E4D9F0; color:var(--violet); }
  .desc{ font-size:9.5px; color:var(--ink-soft); margin-top:3px; min-height:11px; }
  .day-chip.placeholder{ opacity:0.75; }
  .day-chip.placeholder .desc{ font-size:10.5px; }
  .weather-status{ font-size:12.5px; color:var(--ink-soft); padding:4px 2px; }

  button.day-chip{ cursor:pointer; }
  button.day-chip:hover, button.day-chip:focus-visible{ border-color:var(--teal); box-shadow:var(--shadow); }

  /* On phones, a row of small square tiles gets cramped — lay days out as
     full-width horizontal bars instead. Desktop keeps the tile-row layout. */
  @media (max-width:640px){
    .weather-row{ flex-direction:column; gap:6px; }
    .day-chip{
      width:100%; display:flex; align-items:center; text-align:left; gap:10px; padding:8px 12px;
    }
    .day-chip .day-label{ width:58px; flex-shrink:0; order:1; }
    .day-chip .day-icon, .day-chip .day-icon-spacer{ margin:0; flex-shrink:0; order:2; }
    .day-chip .desc{
      order:3; display:block; margin-top:0; min-height:0;
      font-size:10.5px; line-height:1.25; max-width:74px; white-space:normal;
    }
    .day-chip .temps{ margin-left:auto; white-space:nowrap; order:4; }
    .day-chip .badge-stack{
      order:5; display:flex; flex-direction:column; align-items:flex-end; justify-content:center; gap:2px; flex-shrink:0;
    }
    .day-chip .badge-stack .precip{ margin-top:0; }
    .day-chip .badge-stack .uv-badge{ display:inline-block; margin-left:0; white-space:nowrap; }
    .day-chip .badge-stack .aqi-badge{ display:inline-block; margin-left:0; white-space:nowrap; }
  }

  .edit-actions-row{ display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-top:8px; margin-left:44px; }
  .add-stop-btn{
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 12px; border-radius:8px; border:1px dashed var(--line); background:none; color:var(--teal); font-size:13px;
  }
  .add-stop-btn:hover{ border-color:var(--teal); background:var(--teal-soft); }

  .warn{ font-size:11.5px; color:var(--danger); margin:-6px 0 10px; }

  .save-error-banner{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--amber-soft); color:#7A4300; border:1px solid var(--amber);
    border-radius:8px; padding:9px 12px; font-size:12.5px; margin:0 20px 14px;
  }
  .save-error-banner button{ background:none; border:none; color:#7A4300; font-size:16px; line-height:1; padding:0 2px; flex-shrink:0; }
  @media (min-width:880px){ .save-error-banner{ margin:14px 20px 0; grid-column:1/-1; } }

  ::selection{ background:var(--amber-soft); }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <svg class="brand-mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#186A72"/>
      <g fill="#ffffff" fill-rule="evenodd">
        <rect x="29" y="5" width="2.4" height="5.5" rx="1.2" transform="rotate(20 30.2 7.75)"/>
        <rect x="33.5" y="9" width="2.4" height="5.5" rx="1.2" transform="rotate(70 34.7 11.75)"/>
        <rect x="24.5" y="2" width="2.4" height="5.5" rx="1.2" transform="rotate(-25 25.7 4.75)"/>
        <path d="M20 8c-5.2 0-9.4 4.1-9.4 9.3c0 6.8 9.4 15.7 9.4 15.7s9.4-8.9 9.4-15.7C29.4 12.1 25.2 8 20 8Z"/>
        <circle cx="20" cy="17.3" r="3.6" fill="#186A72"/>
      </g>
    </svg>
    <div class="brand">
      <h1>Reisweer</h1>
      <p>Het weer voor je hele route, in één overzicht.</p>
    </div>
  </div>
  <button type="button" class="icon-btn settings-btn" onclick="App.openSettings()" title="Instellingen" aria-label="Instellingen">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 13a7.4 7.4 0 0 0 .1-2l2.1-1.6-2-3.5-2.5 1a7.7 7.7 0 0 0-1.7-1L15 3h-6l-.4 2.9a7.7 7.7 0 0 0-1.7 1l-2.5-1-2 3.5L4.5 11a7.4 7.4 0 0 0 0 2l-2.1 1.6 2 3.5 2.5-1c.5.4 1.1.8 1.7 1L9 21h6l.4-2.9c.6-.2 1.2-.6 1.7-1l2.5 1 2-3.5L19.4 13Z" stroke-linejoin="round"/></svg>
  </button>
</div>
<div class="layout" id="layout"></div>
<div id="modal-host"></div>

<script>
/* ---------- helpers ---------- */
function toISO(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
function escHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escAttr(str){ return escHtml(str); }

function dateRangeArr(startISO, endISO){
  const out=[];
  if(!startISO || !endISO) return out;
  let d=new Date(startISO+'T00:00:00'); const end=new Date(endISO+'T00:00:00');
  if(d>end) return out;
  while(d<=end){ out.push(toISO(d)); d=addDays(d,1); }
  return out;
}
function formatDayLabel(iso){
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('nl-NL', {weekday:'short', day:'numeric', month:'short'});
}
function formatRangeLabel(startISO,endISO){
  const s=new Date(startISO+'T00:00:00'), e=new Date(endISO+'T00:00:00');
  const opts={day:'numeric', month:'short'};
  if(startISO===endISO) return s.toLocaleDateString('nl-NL', opts);
  return s.toLocaleDateString('nl-NL', opts) + ' – ' + e.toLocaleDateString('nl-NL', opts);
}

const TODAY = new Date();
const TODAY_ISO = toISO(TODAY);
const HORIZON_ISO = toISO(addDays(TODAY, 15));
const STORAGE_KEY = 'trips';

/* ---------- weather code mapping (Open-Meteo WMO codes) ---------- */
const WEATHER_MAP = {
  0:['sun','Zonnig'],1:['partly','Licht bewolkt'],2:['partly','Half bewolkt'],3:['cloud','Bewolkt'],
  45:['fog','Mist'],48:['fog','Rijpmist'],
  51:['drizzle','Motregen'],53:['drizzle','Motregen'],55:['drizzle','Motregen'],56:['drizzle','IJzel'],57:['drizzle','IJzel'],
  61:['rain','Regen'],63:['rain','Regen'],65:['rain','Zware regen'],66:['rain','IJzel'],67:['rain','IJzel'],
  71:['snow','Sneeuw'],73:['snow','Sneeuw'],75:['snow','Zware sneeuw'],77:['snow','Sneeuwkorrels'],
  80:['rain','Buien'],81:['rain','Buien'],82:['rain','Zware buien'],
  85:['snow','Sneeuwbuien'],86:['snow','Sneeuwbuien'],
  95:['storm','Onweer'],96:['storm','Onweer + hagel'],99:['storm','Onweer + hagel']
};
function weatherInfo(code){ return WEATHER_MAP[code] || ['cloud','Onbekend']; }
function fmtTemp(v){ return (typeof v==='number' && isFinite(v)) ? Math.round(v)+'°' : '–'; }
function windDirLabel(deg){
  if(typeof deg !== 'number' || !isFinite(deg)) return null;
  const dirs = ['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5) % 16];
}
function uvRiskLabel(uv){
  if(typeof uv !== 'number') return '';
  if(uv < 3) return 'laag';
  if(uv < 6) return 'matig';
  if(uv < 8) return 'hoog';
  if(uv < 11) return 'zeer hoog';
  return 'extreem';
}
function uvRiskClass(uv){
  if(typeof uv !== 'number') return 'low';
  if(uv < 3) return 'low';
  if(uv < 6) return 'mid';
  if(uv < 8) return 'high';
  if(uv < 11) return 'vhigh';
  return 'extreme';
}
function aqiRiskClass(aqi){
  if(typeof aqi !== 'number') return 'good';
  if(aqi <= 50) return 'good';
  if(aqi <= 100) return 'moderate';
  if(aqi <= 150) return 'usg';
  if(aqi <= 200) return 'unhealthy';
  return 'veryunhealthy';
}
function aqiCategoryLabel(aqi){
  if(typeof aqi !== 'number') return '';
  if(aqi <= 50) return 'Goed';
  if(aqi <= 100) return 'Matig';
  if(aqi <= 150) return 'Ongezond voor gevoelige groepen';
  if(aqi <= 200) return 'Ongezond';
  if(aqi <= 300) return 'Zeer ongezond';
  return 'Gevaarlijk';
}
function haversineKm(lat1,lon1,lat2,lon2){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)*Math.sin(dLon/2);
  return 2*R*Math.asin(Math.sqrt(a));
}
function firmsMapLink(lat, lon){
  // Zoom 10 shows roughly a 50-75km-wide view in FIRMS' map viewer — close to the
  // requested ~50km range (exact width varies slightly with screen size).
  return 'https://firms.modaps.eosdis.nasa.gov/map/#m:advanced;d:24hrs;@'+lon.toFixed(4)+','+lat.toFixed(4)+',10z';
}
function moonPhaseLabel(v){
  if(typeof v !== 'number') return null;
  if(v < 0.03 || v > 0.97) return 'Nieuwe maan';
  if(v < 0.22) return 'Wassende maansikkel';
  if(v < 0.28) return 'Eerste kwartier';
  if(v < 0.47) return 'Wassende maan';
  if(v < 0.53) return 'Volle maan';
  if(v < 0.72) return 'Afnemende maan';
  if(v < 0.78) return 'Laatste kwartier';
  return 'Afnemende maansikkel';
}
function fmtSunTime(raw){
  if(!raw) return null;
  if(raw.indexOf('T')!==-1) return raw.slice(11,16);
  return raw.slice(0,5);
}
function fmtHours(seconds){
  if(typeof seconds !== 'number') return null;
  return (Math.round((seconds/3600)*10)/10)+' u';
}

const CLOUD_BASE = '<ellipse cx="20" cy="26" rx="9" ry="4.5"/><circle cx="14" cy="21.5" r="4.8"/><circle cx="20.5" cy="18.5" r="6"/><circle cx="26.5" cy="21.5" r="4.2"/>';
const CLOUD_HIGH = '<ellipse cx="20" cy="23" rx="9" ry="4.5"/><circle cx="14" cy="18.5" r="4.8"/><circle cx="20.5" cy="15.5" r="6"/><circle cx="26.5" cy="18.5" r="4.2"/>';
const SUN_RAYS = [0,45,90,135,180,225,270,315].map(a=>'<rect x="18.7" y="5" width="2.6" height="6" rx="1.3" transform="rotate('+a+' 20 20)"/>').join('');
const WEATHER_STYLE = {
  sun:    { color:'var(--amber)',   glyph:'<circle cx="20" cy="20" r="7.5"/>'+SUN_RAYS },
  partly: { color:'var(--amber)',   glyph:'<circle cx="14" cy="13" r="4"/><rect x="12.7" y="4.5" width="2.6" height="4" rx="1.3"/><rect x="4.5" y="11.7" width="4" height="2.6" rx="1.3"/><rect x="7.6" y="7.6" width="2.6" height="4" rx="1.3" transform="rotate(-45 8.9 9.6)"/>'+CLOUD_BASE },
  cloud:  { color:'var(--slate)',   glyph:CLOUD_BASE },
  fog:    { color:'var(--slate)',   glyph:'<rect x="9" y="13" width="14" height="2.6" rx="1.3"/><rect x="9" y="18.4" width="22" height="2.6" rx="1.3"/><rect x="9" y="23.8" width="17" height="2.6" rx="1.3"/><rect x="9" y="29.2" width="22" height="2.6" rx="1.3"/>' },
  drizzle:{ color:'var(--teal)',    glyph:CLOUD_HIGH+'<ellipse cx="15" cy="32" rx="1.5" ry="2.6"/><ellipse cx="20" cy="34" rx="1.5" ry="2.6"/><ellipse cx="25" cy="32" rx="1.5" ry="2.6"/>' },
  rain:   { color:'var(--teal)',    glyph:CLOUD_HIGH+'<ellipse cx="14" cy="33" rx="1.7" ry="3.4"/><ellipse cx="20" cy="35.5" rx="1.7" ry="3.4"/><ellipse cx="26" cy="33" rx="1.7" ry="3.4"/>' },
  snow:   { color:'var(--iceblue)', glyph:CLOUD_HIGH+'<circle cx="14" cy="32.5" r="2"/><circle cx="20" cy="34.5" r="2"/><circle cx="26" cy="32.5" r="2"/>' },
  storm:  { color:'var(--violet)',  glyph:CLOUD_HIGH+'<path d="M22 20.5l-9.5 11h5.7l-1.7 7.5L26 27h-6.2l2.2-6.5Z"/>' }
};
function iconSvg(name){
  const s = WEATHER_STYLE[name] || WEATHER_STYLE.cloud;
  return '<svg class="day-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="20" fill="'+s.color+'"/><g fill="#fff" fill-rule="evenodd">'+s.glyph+'</g></svg>';
}

/* Flame icon for fire-risk notices — sized to actually fill the badge, unlike a small
   generic warning glyph, so it reads clearly as fire rather than a vague icon. */
const FLAME_ICON_SVG = '<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
  +'<path d="M20 5c-2 4-7 8-7 14a7 7 0 0 0 14 0c0-3-1.5-5-3-6.5.3 2-.7 3.5-2 3.5-1.8 0-2-2.5-1-5.5C21.5 8.5 20.8 6.5 20 5Z" fill="#fff" fill-rule="evenodd"/>'
  +'</svg>';

/* ---------- state ---------- */
let state = {
  loading: true,
  trips: [],
  selectedTripId: null,
  mode: 'view', // 'view' shows the polished read-only itinerary; 'edit' shows the editable form
  confirmDeleteTripId: null,
  confirmClearAll: false,
  saveError: null,
  showBackupPanel: false,
  importFeedback: null,
  showSettingsPanel: false,
  settings: { provider: 'openmeteo', vcKey: '', airQuality: true, showFirms: false, firmsKey: '', inAppWarning: true },
  dayDetail: null // {stopId, date} when a day tile's detail view is open
};
const SETTINGS_KEY = 'reisweer-settings';
const weatherCache = {};   // stopId -> {key,status,days}
const searchState = {};    // stopId -> {timer, seq}
const lastSuggestions = {}; // stopId -> [{name,lat,lon}]

/* ---------- storage ----------
   This file runs standalone (downloaded and opened directly in a browser),
   so there is no Claude.ai storage bridge to rely on. Plain localStorage
   is the right tool here — it's the browser's own, always-available
   persistence, and works the same whether opened from disk or hosted. */
let persistenceWarned = false;
function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && typeof parsed==='object'){
        if(parsed.provider==='openmeteo' || parsed.provider==='visualcrossing') state.settings.provider = parsed.provider;
        if(typeof parsed.vcKey==='string') state.settings.vcKey = parsed.vcKey;
        if(typeof parsed.airQuality==='boolean') state.settings.airQuality = parsed.airQuality;
        if(typeof parsed.showFirms==='boolean') state.settings.showFirms = parsed.showFirms;
        if(typeof parsed.firmsKey==='string') state.settings.firmsKey = parsed.firmsKey;
        if(typeof parsed.inAppWarning==='boolean') state.settings.inAppWarning = parsed.inAppWarning;
      }
    }
  }catch(e){ /* keep defaults */ }
}
function saveSettingsState(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings)); }catch(e){ /* non-critical */ }
}
function loadTrips(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    state.trips = raw ? JSON.parse(raw) : [];
  }catch(e){
    state.trips = [];
  }
  state.loading = false;
  if(state.trips.length && !state.selectedTripId) state.selectedTripId = state.trips[0].id;
  render();
}
let saveTimer=null;
function persistTripsNow(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.trips));
    const changed = persistenceWarned;
    if(persistenceWarned){ persistenceWarned = false; state.saveError = null; }
    return changed;
  }catch(e){
    console.error('Opslaan mislukt', e);
    const changed = !persistenceWarned;
    if(!persistenceWarned){
      persistenceWarned = true;
      state.saveError = 'Automatisch opslaan werkt niet in deze browser. Klik hieronder op "Bewaren & laden" om je reisplannen zelf te bewaren.';
    }
    return changed;
  }
}
function saveTrips(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    if(persistTripsNow()) render();
  }, 300);
}

/* ---------- weather fetching (direct Open-Meteo, no key needed) ---------- */
function findStopById(stopId){
  for(const trip of state.trips){
    const s = trip.stops.find(x=>x.id===stopId);
    if(s) return s;
  }
  return null;
}
function findTripByStopId(stopId){
  return state.trips.find(t=>t.stops.some(s=>s.id===stopId)) || null;
}
function buildTripDayList(trip){
  // Flattened, chronological list of every navigable ('ok') day across all
  // stops in the trip, in stop order — lets the detail popup step through
  // the whole route rather than just one stop's days.
  const list = [];
  trip.stops.forEach(s=>{
    const cache = weatherCache[s.id];
    if(cache && cache.status==='ok'){
      cache.days.forEach(d=>{ if(d.kind==='ok') list.push({ stopId: s.id, date: d.date }); });
    }
  });
  return list;
}
const VC_ICON_MAP = {
  'clear-day':['sun','Zonnig'], 'clear-night':['sun','Helder'],
  'partly-cloudy-day':['partly','Half bewolkt'], 'partly-cloudy-night':['partly','Half bewolkt'],
  'cloudy':['cloud','Bewolkt'], 'wind':['cloud','Winderig'], 'fog':['fog','Mist'],
  'rain':['rain','Regen'], 'showers-day':['rain','Buien'], 'showers-night':['rain','Buien'],
  'snow':['snow','Sneeuw'], 'snow-showers-day':['snow','Sneeuwbuien'], 'snow-showers-night':['snow','Sneeuwbuien'], 'sleet':['snow','Natte sneeuw'],
  'thunder':['storm','Onweer'], 'thunder-rain':['storm','Onweer'], 'thunder-showers-day':['storm','Onweer'], 'thunder-showers-night':['storm','Onweer']
};
function vcIconInfo(icon){ return VC_ICON_MAP[icon] || ['cloud','Onbekend']; }

function ensureWeather(stop){
  if(!stop.lat || !stop.lon || !stop.arrival || !stop.departure) return;
  const key = stop.id+'|'+stop.lat+','+stop.lon+'|'+stop.arrival+'|'+stop.departure+'|'+state.settings.provider+'|'+(state.settings.provider==='visualcrossing'?state.settings.vcKey:'');
  const cached = weatherCache[stop.id];
  if(cached && cached.key===key) return;
  weatherCache[stop.id] = { key, status:'loading', days:null };
  fetchWeather(stop, key);
}
async function fetchWeather(stop, key){
  const fullDays = dateRangeArr(stop.arrival, stop.departure);
  const provider = state.settings.provider;
  const fetchStart = stop.arrival < TODAY_ISO ? TODAY_ISO : stop.arrival;
  // Open-Meteo's forecast window is a hard ~16 days. Visual Crossing fills dates
  // beyond its ~15-day forecast with long-range statistical averages automatically,
  // so its range isn't capped the same way — see the "approx" flag below.
  const fetchEnd = (provider==='visualcrossing')
    ? stop.departure
    : (stop.departure > HORIZON_ISO ? HORIZON_ISO : stop.departure);
  const apiDays = {};
  if(fetchStart <= fetchEnd){
    try{
      if(provider === 'visualcrossing'){
        const apiKey = (state.settings.vcKey||'').trim();
        if(!apiKey) throw new Error('Geen API-sleutel ingesteld voor Visual Crossing');
        const url = 'https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/'+stop.lat+','+stop.lon+'/'+fetchStart+'/'+fetchEnd
          +'?key='+encodeURIComponent(apiKey)+'&unitGroup=metric&include=days'
          +'&elements=datetime,tempmax,tempmin,feelslikemax,feelslikemin,precip,precipprob,humidity,windspeed,windgust,winddir,pressure,cloudcover,visibility,uvindex,sunrise,sunset,moonphase,icon,source'
          +'&contentType=json';
        const res = await fetch(url);
        if(!res.ok) throw new Error('bad response '+res.status);
        const data = await res.json();
        (data.days||[]).forEach(d=>{
          if(!d || !d.datetime) return;
          const info = vcIconInfo(d.icon);
          apiDays[d.datetime] = {
            iconKey: info[0], label: info[1],
            tmax: d.tempmax, tmin: d.tempmin, precip: d.precipprob,
            precipAmount: typeof d.precip==='number' ? d.precip : null,
            feelsMax: typeof d.feelslikemax==='number' ? d.feelslikemax : null,
            feelsMin: typeof d.feelslikemin==='number' ? d.feelslikemin : null,
            windMax: typeof d.windspeed==='number' ? d.windspeed : null,
            windGustMax: typeof d.windgust==='number' ? d.windgust : null,
            windDir: typeof d.winddir==='number' ? d.winddir : null,
            uvMax: typeof d.uvindex==='number' ? d.uvindex : null,
            sunrise: d.sunrise||null, sunset: d.sunset||null, sunshineSec: null,
            humidity: typeof d.humidity==='number' ? d.humidity : null,
            pressure: typeof d.pressure==='number' ? d.pressure : null,
            visibility: typeof d.visibility==='number' ? d.visibility : null,
            cloudCover: typeof d.cloudcover==='number' ? d.cloudcover : null,
            moonphase: typeof d.moonphase==='number' ? d.moonphase : null,
            approx: d.source==='stats' || d.source==='statsfcst'
          };
        });
      } else {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude='+stop.lat+'&longitude='+stop.lon+
          '&daily=weathercode,temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,'+
          'precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max,wind_direction_10m_dominant,'+
          'uv_index_max,sunrise,sunset,sunshine_duration&timezone=auto'+
          '&start_date='+fetchStart+'&end_date='+fetchEnd;
        const res = await fetch(url);
        if(!res.ok) throw new Error('bad response');
        const data = await res.json();
        const dd = data.daily;
        const t = dd.time;
        for(let i=0;i<t.length;i++){
          const info = weatherInfo(dd.weathercode[i]);
          apiDays[t[i]] = {
            iconKey: info[0], label: info[1],
            tmax: dd.temperature_2m_max[i],
            tmin: dd.temperature_2m_min[i],
            precip: dd.precipitation_probability_max ? dd.precipitation_probability_max[i] : null,
            precipAmount: dd.precipitation_sum ? dd.precipitation_sum[i] : null,
            feelsMax: dd.apparent_temperature_max ? dd.apparent_temperature_max[i] : null,
            feelsMin: dd.apparent_temperature_min ? dd.apparent_temperature_min[i] : null,
            windMax: dd.wind_speed_10m_max ? dd.wind_speed_10m_max[i] : null,
            windGustMax: dd.wind_gusts_10m_max ? dd.wind_gusts_10m_max[i] : null,
            windDir: dd.wind_direction_10m_dominant ? dd.wind_direction_10m_dominant[i] : null,
            uvMax: dd.uv_index_max ? dd.uv_index_max[i] : null,
            sunrise: dd.sunrise ? dd.sunrise[i] : null,
            sunset: dd.sunset ? dd.sunset[i] : null,
            sunshineSec: dd.sunshine_duration ? dd.sunshine_duration[i] : null,
            humidity: null, pressure: null, visibility: null, cloudCover: null, moonphase: null,
            approx: false
          };
        }
      }
    }catch(e){
      if(weatherCache[stop.id] && weatherCache[stop.id].key===key){
        weatherCache[stop.id] = { key, status:'error', days:null };
        updateWeatherDom(stop.id);
      }
      return;
    }
  }
  const days = fullDays.map(d=>{
    if(apiDays[d]) return Object.assign({date:d, kind:'ok'}, apiDays[d]);
    if(d < TODAY_ISO) return {date:d, kind:'past'};
    if(provider!=='visualcrossing' && d > HORIZON_ISO) return {date:d, kind:'future'};
    return {date:d, kind:'unknown'};
  });
  if(weatherCache[stop.id] && weatherCache[stop.id].key===key){
    weatherCache[stop.id] = { key, status:'ok', days };
    updateWeatherDom(stop.id);
  }
}
function updateWeatherDom(stopId){
  const el = document.getElementById('weather-'+stopId);
  if(el) el.outerHTML = renderWeatherBlock(stopId);
}

/* ---------- air quality (per-day forecast, Open-Meteo — same pattern as weather) ---------- */
const airQualityCache = {}; // stopId -> {key,status,days:{date:{maxAqi,maxPm25}}}
const AQ_HORIZON_ISO = toISO(addDays(TODAY, 6)); // Air Quality API forecasts up to 7 days, hourly only
function ensureAirQuality(stop){
  if(!state.settings.airQuality) return;
  if(!stop.lat || !stop.lon || !stop.arrival || !stop.departure) return;
  const key = stop.id+'|'+stop.lat+','+stop.lon+'|'+stop.arrival+'|'+stop.departure;
  const cached = airQualityCache[stop.id];
  if(cached && cached.key===key) return;
  airQualityCache[stop.id] = { key, status:'loading', days:null };
  fetchAirQuality(stop, key);
}
async function fetchAirQuality(stop, key){
  const fetchStart = stop.arrival < TODAY_ISO ? TODAY_ISO : stop.arrival;
  const fetchEnd = stop.departure > AQ_HORIZON_ISO ? AQ_HORIZON_ISO : stop.departure;
  if(fetchStart > fetchEnd){
    if(airQualityCache[stop.id] && airQualityCache[stop.id].key===key){
      airQualityCache[stop.id] = { key, status:'ok', days:{} };
    }
    return;
  }
  try{
    const url = 'https://air-quality-api.open-meteo.com/v1/air-quality?latitude='+stop.lat+'&longitude='+stop.lon
      +'&hourly=us_aqi,pm2_5&timezone=auto&start_date='+fetchStart+'&end_date='+fetchEnd;
    const res = await fetch(url);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    const t = (data.hourly && data.hourly.time) || [];
    const byDate = {};
    t.forEach((iso,i)=>{
      const d = iso.slice(0,10);
      const aqi = data.hourly.us_aqi ? data.hourly.us_aqi[i] : null;
      const pm25 = data.hourly.pm2_5 ? data.hourly.pm2_5[i] : null;
      if(!byDate[d]) byDate[d] = { maxAqi:null, maxPm25:null };
      if(typeof aqi==='number' && (byDate[d].maxAqi===null || aqi>byDate[d].maxAqi)) byDate[d].maxAqi = aqi;
      if(typeof pm25==='number' && (byDate[d].maxPm25===null || pm25>byDate[d].maxPm25)) byDate[d].maxPm25 = pm25;
    });
    if(airQualityCache[stop.id] && airQualityCache[stop.id].key===key){
      airQualityCache[stop.id] = { key, status:'ok', days: byDate };
      render();
    }
  }catch(e){
    if(airQualityCache[stop.id] && airQualityCache[stop.id].key===key){
      airQualityCache[stop.id] = { key, status:'error', days:null };
    }
  }
}

/* ---------- FIRMS (NASA) — recent satellite hotspot snapshot, stop-level, not per-day ----------
   Unlike weather/air quality, this is not a forecast: it's a report of what's been
   detected nearby in the last few days. Requires the person's own free NASA MAP_KEY. */
const firmsCache = {}; // stopId -> {key,status,hotspots:[{lat,lon,date,confidence,distanceKm}]}
function ensureFirms(stop){
  if(!state.settings.showFirms) return;
  const apiKey = (state.settings.firmsKey||'').trim();
  if(!apiKey) return;
  if(!stop.lat || !stop.lon) return;
  const key = stop.id+'|'+stop.lat+','+stop.lon+'|'+apiKey;
  const cached = firmsCache[stop.id];
  if(cached && cached.key===key) return;
  firmsCache[stop.id] = { key, status:'loading', hotspots:null };
  fetchFirms(stop, key, apiKey);
}
async function fetchFirms(stop, key, apiKey){
  try{
    const d = 0.6; // roughly a 130km-wide box around the stop
    const west=(stop.lon-d).toFixed(2), east=(stop.lon+d).toFixed(2), south=(stop.lat-d).toFixed(2), north=(stop.lat+d).toFixed(2);
    const url = 'https://firms.modaps.eosdis.nasa.gov/api/area/csv/'+encodeURIComponent(apiKey)+'/VIIRS_SNPP_NRT/'+west+','+south+','+east+','+north+'/3';
    const res = await fetch(url);
    if(!res.ok) throw new Error('bad response '+res.status);
    const text = await res.text();
    const lines = text.trim().split('\n').filter(l=>l.trim().length>0);
    if(lines.length===0){
      if(firmsCache[stop.id] && firmsCache[stop.id].key===key){
        firmsCache[stop.id] = { key, status:'ok', hotspots: [] };
        render();
      }
      return;
    }
    const header = lines[0].split(',').map(h=>h.trim());
    const latIdx = header.indexOf('latitude'), lonIdx = header.indexOf('longitude');
    if(latIdx===-1 || lonIdx===-1) throw new Error('unexpected response format');
    const dateIdx = header.indexOf('acq_date'), confIdx = header.indexOf('confidence');
    const hotspots = [];
    for(let i=1;i<lines.length;i++){
      const cols = lines[i].split(',');
      const hLat = parseFloat(cols[latIdx]), hLon = parseFloat(cols[lonIdx]);
      if(!isFinite(hLat) || !isFinite(hLon)) continue;
      hotspots.push({
        lat:hLat, lon:hLon,
        date: dateIdx>=0 ? cols[dateIdx] : null,
        confidence: confIdx>=0 ? cols[confIdx] : null,
        distanceKm: haversineKm(stop.lat, stop.lon, hLat, hLon)
      });
    }
    hotspots.sort((a,b)=>a.distanceKm-b.distanceKm);
    if(firmsCache[stop.id] && firmsCache[stop.id].key===key){
      firmsCache[stop.id] = { key, status:'ok', hotspots: hotspots.slice(0,8) };
      render();
    }
  }catch(e){
    if(firmsCache[stop.id] && firmsCache[stop.id].key===key){
      firmsCache[stop.id] = { key, status:'error', hotspots:null };
    }
  }
}

/* ---------- hourly detail (lazy-loaded per day, on click) ---------- */
const hourlyCache = {}; // key -> {key,status,hours}
function hourlyKeyFor(stopId, date){
  return stopId+'|'+date+'|'+state.settings.provider+'|'+(state.settings.provider==='visualcrossing'?state.settings.vcKey:'');
}
function ensureHourly(stopId, date){
  const stop = findStopById(stopId); if(!stop) return;
  const key = hourlyKeyFor(stopId, date);
  const cached = hourlyCache[key];
  if(cached && cached.key===key) return;
  hourlyCache[key] = { key, status:'loading', hours:null };
  fetchHourly(stop, date, key);
}
async function fetchHourly(stop, date, key){
  const provider = state.settings.provider;
  try{
    let hours;
    if(provider==='visualcrossing'){
      const apiKey = (state.settings.vcKey||'').trim();
      if(!apiKey) throw new Error('geen sleutel');
      const url = 'https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/'+stop.lat+','+stop.lon+'/'+date+'/'+date
        +'?key='+encodeURIComponent(apiKey)+'&unitGroup=metric&include=hours&elements=datetime,temp,precipprob&contentType=json';
      const res = await fetch(url);
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      const dayObj = (data.days||[])[0];
      const hrs = (dayObj && dayObj.hours) ? dayObj.hours : [];
      hours = hrs.map(h=>({
        h: (h.datetime||'').slice(0,2),
        temp: typeof h.temp==='number' ? h.temp : null,
        precip: typeof h.precipprob==='number' ? h.precipprob : null
      }));
    } else {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude='+stop.lat+'&longitude='+stop.lon
        +'&hourly=temperature_2m,precipitation_probability&timezone=auto&start_date='+date+'&end_date='+date;
      const res = await fetch(url);
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      const t = (data.hourly && data.hourly.time) || [];
      hours = t.map((iso,i)=>({
        h: iso.slice(11,13),
        temp: data.hourly.temperature_2m ? data.hourly.temperature_2m[i] : null,
        precip: data.hourly.precipitation_probability ? data.hourly.precipitation_probability[i] : null
      }));
    }
    if(!hours.length) throw new Error('geen data');
    if(hourlyCache[key] && hourlyCache[key].key===key){
      hourlyCache[key] = { key, status:'ok', hours };
      render();
    }
  }catch(e){
    if(hourlyCache[key] && hourlyCache[key].key===key){
      hourlyCache[key] = { key, status:'error', hours:null };
      render();
    }
  }
}
function buildHourlyChartSvg(hours){
  const W=430, H=195, padL=30, padR=30, padT=14, padB=24;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n = hours.length;
  const temps = hours.map(h=>h.temp).filter(v=>typeof v==='number');
  const dataMin = temps.length ? Math.min(...temps) : 0;
  const dataMax = temps.length ? Math.max(...temps) : 1;
  const pad = Math.max(1, (dataMax-dataMin)*0.2);
  const axisMin = dataMin - pad, axisMax = dataMax + pad;
  const axisRange = Math.max(1, axisMax-axisMin);

  const xFor = i => padL + (n>1 ? plotW*i/(n-1) : plotW/2);
  const yForTemp = t => padT + plotH - ((t-axisMin)/axisRange)*plotH;
  const yForPrecip = p => padT + plotH - (Math.max(0,Math.min(100,p))/100)*plotH;

  // Three shared horizontal gridlines: same y-positions, different numbers on
  // each side, so the temperature line and the precipitation bars are each
  // readable against their own scale instead of an undefined shared one.
  const gridY = [padT, padT+plotH/2, padT+plotH];
  const tempTicks = [axisMax, (axisMax+axisMin)/2, axisMin];
  const precipTicks = [100,50,0];
  const grid = gridY.map((y,i)=>
    '<line x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(padL+plotW).toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="var(--line)" stroke-width="1"/>'
    +'<text x="'+(padL-5)+'" y="'+(y+3).toFixed(1)+'" font-size="8.5" text-anchor="end" fill="var(--amber)">'+Math.round(tempTicks[i])+'°</text>'
    +'<text x="'+(padL+plotW+5)+'" y="'+(y+3).toFixed(1)+'" font-size="8.5" text-anchor="start" fill="var(--teal)">'+precipTicks[i]+'%</text>'
  ).join('');

  const barW = Math.max(3, (plotW/n)*0.55);
  const bars = hours.map((h,i)=>{
    if(typeof h.precip !== 'number') return '';
    const y = yForPrecip(h.precip);
    const x = xFor(i)-barW/2;
    const bh = (padT+plotH) - y;
    return '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+barW.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="1.5" fill="var(--teal-soft)"/>';
  }).join('');
  const linePts = hours.map((h,i)=> typeof h.temp==='number' ? xFor(i).toFixed(1)+','+yForTemp(h.temp).toFixed(1) : null).filter(Boolean);
  const path = linePts.length ? 'M'+linePts.join(' L') : '';
  const dots = hours.map((h,i)=> typeof h.temp==='number' ? '<circle cx="'+xFor(i).toFixed(1)+'" cy="'+yForTemp(h.temp).toFixed(1)+'" r="2.2" fill="var(--amber)"/>' : '').join('');
  const xLabels = hours.map((h,i)=> (i%3===0) ? '<text x="'+xFor(i).toFixed(1)+'" y="'+(H-6)+'" font-size="8" text-anchor="middle" fill="var(--ink-soft)">'+h.h+'</text>' : '').join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" class="hourly-chart" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">'
    +grid+bars+'<path d="'+path+'" fill="none" stroke="var(--amber)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+dots+xLabels+'</svg>';
}

App.moveStop = function(tripId, stopId, dir){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  const idx = trip.stops.findIndex(s=>s.id===stopId);
  const swap = idx+dir;
  if(swap<0 || swap>=trip.stops.length) return;
  const tmp = trip.stops[idx]; trip.stops[idx]=trip.stops[swap]; trip.stops[swap]=tmp;
  saveTrips(); render();
};
App.updateStopDate = function(tripId, stopId, field, value){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  const stop = trip.stops.find(s=>s.id===stopId); if(!stop) return;
  stop[field] = value;
  if(stop.arrival && stop.departure && stop.departure < stop.arrival){
    if(field==='arrival') stop.departure = value; else stop.arrival = value;
  }
  delete weatherCache[stopId];
  saveTrips(); render();
};
App.onSearchInput = function(tripId, stopId, value){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  const stop = trip.stops.find(s=>s.id===stopId); if(!stop) return;
  stop.query = value;
  saveTrips();
  const box = document.getElementById('sugg-'+stopId);
  if(!searchState[stopId]) searchState[stopId] = {timer:null, seq:0};
  clearTimeout(searchState[stopId].timer);
  if(!value || value.trim().length<2){ if(box) box.innerHTML=''; return; }
  searchState[stopId].timer = setTimeout(()=>doSearch(tripId, stopId, value), 350);
};
async function doSearch(tripId, stopId, q){
  const mySeq = ++searchState[stopId].seq;
  const box = document.getElementById('sugg-'+stopId);
  if(box) box.innerHTML = '<div class="sugg-empty">Zoeken…</div>';
  try{
    const url = 'https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=5&language=nl&format=json';
    const res = await fetch(url);
    if(!res.ok) throw new Error('bad response');
    const data = await res.json();
    if(mySeq !== searchState[stopId].seq) return;
    if(!box) return;
    const results = (data.results||[]).map(r=>({
      name: [r.name, r.admin1, r.country].filter(Boolean).join(', '),
      lat: r.latitude, lon: r.longitude
    }));
    lastSuggestions[stopId] = results;
    if(!results.length){ box.innerHTML = '<div class="sugg-empty">Geen plaatsen gevonden</div>'; return; }
    box.innerHTML = results.map((r,i)=>
      '<button type="button" onclick="App.pickPlace(\''+tripId+'\',\''+stopId+'\','+i+')">'+escHtml(r.name)+'</button>'
    ).join('');
  }catch(e){
    if(mySeq !== searchState[stopId].seq) return;
    if(box) box.innerHTML = '<div class="sugg-empty">Kon niet zoeken. Controleer je internetverbinding.</div>';
  }
}
App.pickPlace = function(tripId, stopId, idx){
  const trip = state.trips.find(t=>t.id===tripId); if(!trip) return;
  const stop = trip.stops.find(s=>s.id===stopId); if(!stop) return;
  const picked = (lastSuggestions[stopId]||[])[idx]; if(!picked) return;
  stop.name = picked.name; stop.lat = picked.lat; stop.lon = picked.lon; stop.query = picked.name;
  delete weatherCache[stopId];
  saveTrips(); render();
};

  try{

    const data = JSON.stringify(state.trips, null, 2);

  const ends = trip.stops.map(s=>s.departure).filter(Boolean).sort();

function renderWeatherBlock(stopId){
  const stop = findStopById(stopId);
  if(!stop) return '';
  if(!stop.lat || !stop.lon){
    return '<div id="weather-'+stopId+'" class="weather-status">Zoek en kies een plaats om het weer te zien.</div>';
  }
  const cache = weatherCache[stopId];
  if(!cache || cache.status==='loading'){
    return '<div id="weather-'+stopId+'" class="weather-status">Weer laden…</div>';
  }
  if(cache.status==='error'){
    const noKey = state.settings.provider==='visualcrossing' && !(state.settings.vcKey||'').trim();
    const msg = noKey
      ? 'Geen Visual Crossing API-sleutel ingesteld. <button type="button" class="mini-btn" onclick="App.openSettings()">Naar instellingen</button>'
      : 'Kon het weer niet ophalen. <button type="button" class="mini-btn" onclick="App.retryWeather(\''+stopId+'\')">Opnieuw</button>';
    return '<div id="weather-'+stopId+'" class="weather-status">'+msg+'</div>';
  }
  const hasApprox = cache.days.some(d=>d.kind==='ok' && d.approx);
  const aqCache = airQualityCache[stopId];
  const chips = cache.days.map(d=>{
    const isToday = d.date===TODAY_ISO;
    if(d.kind==='ok'){
      const precip = (typeof d.precip==='number' && d.precip>=20)
        ? '<span class="precip">'+Math.round(d.precip)+'%</span>' : '';
      const uvBadge = (typeof d.uvMax==='number')
        ? '<span class="uv-badge uv-'+uvRiskClass(d.uvMax)+'">UV '+Math.round(d.uvMax)+'</span>' : '';
      const aqDay = (state.settings.airQuality && aqCache && aqCache.status==='ok') ? aqCache.days[d.date] : null;
      const aqiBadge = (aqDay && typeof aqDay.maxAqi==='number')
        ? '<span class="aqi-badge aqi-'+aqiRiskClass(aqDay.maxAqi)+'">AQI '+Math.round(aqDay.maxAqi)+'</span>' : '';
      const tilde = d.approx ? '~' : '';
      return '<button type="button" class="day-chip'+(isToday?' is-today':'')+(d.approx?' is-approx':'')+'" onclick="App.openDayDetail(\''+stopId+'\',\''+d.date+'\')">'
        +'<div class="day-label">'+formatDayLabel(d.date)+'</div>'
        +iconSvg(d.iconKey)
        +'<div class="temps"><span class="t-max">'+tilde+fmtTemp(d.tmax)+'</span> <span class="t-min">'+tilde+fmtTemp(d.tmin)+'</span></div>'
        +'<div class="desc">'+d.label+'</div>'
        +'<div class="badge-stack">'+precip+uvBadge+aqiBadge+'</div></button>';
    }
    const msg = d.kind==='future' ? 'Nog te ver vooruit' : d.kind==='past' ? 'Verstreken' : 'Onbekend';
    return '<div class="day-chip placeholder'+(isToday?' is-today':'')+'">'
      +'<div class="day-label">'+formatDayLabel(d.date)+'</div>'
      +'<div class="day-icon-spacer" aria-hidden="true"></div>'
      +'<div class="desc">'+msg+'</div></div>';
  }).join('');
  const legend = hasApprox ? '<p class="modal-hint" style="margin:6px 0 0;">~ = langjarig gemiddelde (statistisch), geen harde voorspelling.</p>' : '';
  return '<div id="weather-'+stopId+'">'+renderFirmsRiskRow(stopId)+'<div class="weather-row">'+chips+'</div>'+legend+'</div>';
}

function renderFirmsRiskRow(stopId){
  if(!state.settings.showFirms) return '';
  const cache = firmsCache[stopId];
  if(!cache || cache.status!=='ok' || !cache.hotspots || !cache.hotspots.length) return '';
  const nearest = cache.hotspots[0];
  if(nearest.distanceKm > 60) return '';
  const count = cache.hotspots.length;
  return '<div class="risk-row">'
    +'<div class="badge-circle">'+FLAME_ICON_SVG+'</div>'
    +'<div class="risk-text"><strong>Actieve brandhaard'+(count>1?'en':'')+' dichtbij</strong> — dichtstbij op ongeveer '+Math.round(nearest.distanceKm)+' km (NASA FIRMS, laatste 3 dagen)</div>'
  +'</div>';
}

  const dateWarn = (stop.arrival && stop.departure && stop.departure < stop.arrival)
    ? '<div class="warn">Vertrek ligt voor aankomst</div>' : '';
  return '<div class="stop-row">'
    +'<div class="marker-col"><div class="marker-dot">'+(index+1)+'</div></div>'
    +'<div class="stop-card">'
      +'<div class="stop-card-top">'
        +'<div class="search-wrap field">'
          +'<label for="place-'+stop.id+'">Plaats</label>'
          +'<input id="place-'+stop.id+'" type="text" placeholder="Zoek een plaats…" value="'+escAttr(stop.query||stop.name||'')+'" '
          +'oninput="App.onSearchInput(\''+trip.id+'\',\''+stop.id+'\', this.value)" autocomplete="off" />'
          +'<div class="suggestions" id="sugg-'+stop.id+'"></div>'
        +'</div>'
        +'<div class="field"><label for="arr-'+stop.id+'">Aankomst</label>'

          +'onchange="App.updateStopDate(\''+trip.id+'\',\''+stop.id+'\',\'arrival\', this.value)" /></div>'
        +'<div class="field"><label for="dep-'+stop.id+'">Vertrek</label>'
          +'<input id="dep-'+stop.id+'" type="date" value="'+(stop.departure||'')+'" min="'+(stop.arrival||'')+'" '
          +'onchange="App.updateStopDate(\''+trip.id+'\',\''+stop.id+'\',\'departure\', this.value)" /></div>'
        +'<div class="stop-actions">'
          +'<button type="button" class="icon-btn" title="Omhoog"'+(isFirst?' disabled style="opacity:.3"':'')+' onclick="App.moveStop(\''+trip.id+'\',\''+stop.id+'\',-1)">'
            +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
          +'<button type="button" class="icon-btn" title="Omlaag"'+(isLast?' disabled style="opacity:.3"':'')+' onclick="App.moveStop(\''+trip.id+'\',\''+stop.id+'\',1)">'
            +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'

            +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0-1 13a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1L6 7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'

function renderTripView(trip){

    +'</div>'

    +'<div class="stops-list">'+stopsHtml+'</div>'
  +'</div>';

function renderTripRiskBanner(trip){
  if(!state.settings.inAppWarning) return '';
  const items = [];
  trip.stops.forEach((s,idx)=>{
    if(state.settings.airQuality){
      const aq = airQualityCache[s.id];
      if(aq && aq.status==='ok'){
        let stopMaxAqi = null;
        Object.keys(aq.days).forEach(d=>{
          const val = aq.days[d].maxAqi;
          if(typeof val==='number' && val>100 && (stopMaxAqi===null || val>stopMaxAqi)) stopMaxAqi = val;
        });
        if(stopMaxAqi!==null) items.push({ type:'aqi', aqi:stopMaxAqi, stopName:s.name, stopIndex:idx+1 });
      }
    }
    if(state.settings.showFirms){
      const f = firmsCache[s.id];
      if(f && f.status==='ok' && f.hotspots && f.hotspots.length && f.hotspots[0].distanceKm<=60){
        items.push({ type:'fire', distanceKm:f.hotspots[0].distanceKm, stopName:s.name, stopIndex:idx+1 });
      }
    }
  });
  if(!items.length) return '';
  const lines = items.map(it => it.type==='aqi'
    ? 'Verhoogde luchtvervuiling bij '+escHtml(it.stopName||'een stop')+' (stop '+it.stopIndex+', AQI '+Math.round(it.aqi)+')'
    : 'Actieve brandhaard dichtbij '+escHtml(it.stopName||'een stop')+' (stop '+it.stopIndex+', ongeveer '+Math.round(it.distanceKm)+' km)'
  );
  const body = items.length===1
    ? lines[0]+'.'
    : '<ul style="margin:4px 0 0;padding-left:16px;">'+lines.map(l=>'<li>'+l+'.</li>').join('')+'</ul>';
  return '<div class="risk-row" style="align-items:flex-start;">'
    +'<div class="badge-circle">'+FLAME_ICON_SVG+'</div>'
    +'<div class="risk-text"><strong>Let op'+(items.length>1?' — '+items.length+' meldingen':'')+':</strong> '+body+'</div>'
  +'</div>';
}

function renderDayDetailModal(){
  if(!state.dayDetail) return '';
  const { stopId, date } = state.dayDetail;
  const stop = findStopById(stopId);
  const cache = weatherCache[stopId];
  if(!stop || !cache || cache.status!=='ok') return '';
  const day = cache.days.find(d=>d.date===date && d.kind==='ok');
  if(!day) return '';

  const dateObj = new Date(date+'T00:00:00');
  const fullDateLabel = dateObj.toLocaleDateString('nl-NL', {weekday:'long', day:'numeric', month:'long', year:'numeric'});

  const trip = findTripByStopId(stopId);
  const dayList = trip ? buildTripDayList(trip) : [];
  const curIdx = dayList.findIndex(x=>x.stopId===stopId && x.date===date);
  const prevEntry = curIdx>0 ? dayList[curIdx-1] : null;
  const nextEntry = (curIdx>=0 && curIdx<dayList.length-1) ? dayList[curIdx+1] : null;
  const prevBtn = prevEntry
    ? '<button type="button" class="icon-btn day-nav-btn" onclick="App.openDayDetail(\''+prevEntry.stopId+'\',\''+prevEntry.date+'\')" aria-label="Vorige dag"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
    : '<button type="button" class="icon-btn day-nav-btn" disabled aria-label="Vorige dag"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>';
  const nextBtn = nextEntry
    ? '<button type="button" class="icon-btn day-nav-btn" onclick="App.openDayDetail(\''+nextEntry.stopId+'\',\''+nextEntry.date+'\')" aria-label="Volgende dag"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
    : '<button type="button" class="icon-btn day-nav-btn" disabled aria-label="Volgende dag"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>';

  const rows = [];
  function addRow(label, value){
    if(value===null || value===undefined || value==='') return;
    rows.push('<div class="detail-row"><span class="detail-label">'+label+'</span><span class="detail-value">'+value+'</span></div>');
  }
  addRow('Gevoelstemperatuur', (typeof day.feelsMax==='number' || typeof day.feelsMin==='number')
    ? (fmtTemp(day.feelsMax)+' / '+fmtTemp(day.feelsMin)) : null);
  addRow('Neerslagkans', typeof day.precip==='number' ? Math.round(day.precip)+'%' : null);
  addRow('Neerslag', typeof day.precipAmount==='number' ? (Math.round(day.precipAmount*10)/10)+' mm' : null);
  const windDir = windDirLabel(day.windDir);
  addRow('Wind (max)', typeof day.windMax==='number' ? Math.round(day.windMax)+' km/u'+(windDir?' ('+windDir+')':'') : null);
  addRow('Windstoten (max)', typeof day.windGustMax==='number' ? Math.round(day.windGustMax)+' km/u' : null);
  addRow('UV-index', typeof day.uvMax==='number' ? Math.round(day.uvMax)+' ('+uvRiskLabel(day.uvMax)+')' : null);
  const sunriseTxt = fmtSunTime(day.sunrise), sunsetTxt = fmtSunTime(day.sunset);
  addRow('Zonsopkomst / zonsondergang', (sunriseTxt && sunsetTxt) ? (sunriseTxt+' – '+sunsetTxt) : null);
  addRow('Zonuren', fmtHours(day.sunshineSec));
  addRow('Luchtvochtigheid', typeof day.humidity==='number' ? Math.round(day.humidity)+'%' : null);
  addRow('Luchtdruk', typeof day.pressure==='number' ? Math.round(day.pressure)+' hPa' : null);
  addRow('Zicht', typeof day.visibility==='number' ? (Math.round(day.visibility*10)/10)+' km' : null);
  addRow('Bewolking', typeof day.cloudCover==='number' ? Math.round(day.cloudCover)+'%' : null);
  addRow('Maanfase', moonPhaseLabel(day.moonphase));

  const approxNote = day.approx
    ? '<p class="modal-hint" style="margin-top:10px;">Dit is een langjarig gemiddelde (statistisch), geen harde voorspelling voor deze specifieke dag.</p>'
    : '';

  const hKey = hourlyKeyFor(stopId, date);
  const hCache = hourlyCache[hKey];
  let chartSection;
  if(!hCache || hCache.status==='loading'){
    chartSection = '<div class="weather-status">Uurgegevens laden…</div>';
  } else if(hCache.status==='error'){
    chartSection = '<div class="weather-status">Geen uurgegevens beschikbaar voor deze dag.</div>';
  } else {
    chartSection = buildHourlyChartSvg(hCache.hours)
      +'<div class="chart-legend"><span><i class="legend-dot legend-temp"></i>Temperatuur (°C)</span><span><i class="legend-dot legend-precip"></i>Neerslagkans (%)</span></div>';
  }

  const aqSection = renderAirQualitySection(stopId, date);
  const firmsSection = renderFirmsDetailSection(stopId);

  return '<div class="modal-overlay" onclick="if(event.target===this){App.closeDayDetail();}">'
    +'<div class="modal-card">'
      +'<div class="modal-head">'
        +'<div class="day-nav">'+prevBtn+'<h3 style="text-transform:capitalize;">'+escHtml(fullDateLabel)+'</h3>'+nextBtn+'</div>'
        +'<button type="button" class="icon-btn" onclick="App.closeDayDetail()" aria-label="Sluiten">'
          +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg></button>'
      +'</div>'
      +'<p class="modal-sub" style="margin-top:-6px;">'+escHtml(stop.name||'')+'</p>'
      +'<div class="detail-top">'+iconSvg(day.iconKey)
        +'<div><div class="detail-temp-big">'+fmtTemp(day.tmax)+' <span class="t-min">'+fmtTemp(day.tmin)+'</span></div>'
        +'<div class="desc" style="font-size:12.5px;">'+day.label+'</div></div></div>'
      +'<div class="detail-grid">'+rows.join('')+'</div>'
      +approxNote
      +'<h4 style="margin-top:16px;">Verloop per uur</h4>'
      +chartSection
      +aqSection
      +firmsSection
    +'</div>'
  +'</div>';
}

function renderAirQualitySection(stopId, date){
  if(!state.settings.airQuality) return '';
  const cache = airQualityCache[stopId];
  const day = cache && cache.status==='ok' ? cache.days[date] : null;
  if(!day || typeof day.maxAqi!=='number'){
    const note = (cache && cache.status==='ok' && date>AQ_HORIZON_ISO)
      ? 'Nog niet bekend — luchtkwaliteit is maar tot ~7 dagen vooruit te voorspellen.'
      : null;
    return note ? '<h4 style="margin-top:18px;">Luchtkwaliteit</h4><p class="weather-status">'+note+'</p>' : '';
  }
  const cls = aqiRiskClass(day.maxAqi);
  return '<h4 style="margin-top:18px;">Luchtkwaliteit</h4>'
    +'<div class="aqi-hero aqi-hero-'+cls+'">'
      +'<div class="aqi-num">'+Math.round(day.maxAqi)+'<span class="aqi-num-lbl">AQI</span></div>'
      +'<div class="aqi-desc"><strong>'+aqiCategoryLabel(day.maxAqi)+'</strong>'
        +(typeof day.maxPm25==='number' ? '<br>PM2,5: '+(Math.round(day.maxPm25*10)/10)+' µg/m³' : '')
      +'</div>'
    +'</div>';
}

function renderFirmsDetailSection(stopId){
  if(!state.settings.showFirms) return '';
  const cache = firmsCache[stopId];
  if(!cache || cache.status==='loading') return '<h4 style="margin-top:18px;">Brandhaarden (NASA FIRMS)</h4><p class="weather-status">Laden…</p>';
  if(cache.status==='error') return '<h4 style="margin-top:18px;">Brandhaarden (NASA FIRMS)</h4><p class="weather-status">Kon geen brandhaarddata ophalen. Controleer je NASA-sleutel in Instellingen.</p>';
  const stop = findStopById(stopId);
  const mapUrl = (stop && stop.lat && stop.lon) ? firmsMapLink(stop.lat, stop.lon) : 'https://firms.modaps.eosdis.nasa.gov/map/';
  if(!cache.hotspots || !cache.hotspots.length){
    return '<h4 style="margin-top:18px;">Brandhaarden (NASA FIRMS)</h4><p class="weather-status">Geen actieve branden gedetecteerd in de omgeving in de laatste 3 dagen.</p>';
  }
  const top = cache.hotspots.slice(0,3).map(h=>
    '<div class="detail-row"><span class="detail-label">'+(h.date?escHtml(h.date):'Onbekende datum')+'</span><span class="detail-value">±'+Math.round(h.distanceKm)+' km</span></div>'
  ).join('');
  return '<h4 style="margin-top:18px;">Brandhaarden (NASA FIRMS)</h4>'
    +'<p class="modal-hint" style="margin-top:0;">Recente satellietwaarnemingen dichtbij — geen voorspelling voor deze specifieke dag.</p>'
    +'<div class="detail-grid">'+top+'</div>'
    +'<a class="fire-link" href="'+mapUrl+'" target="_blank" rel="noopener">Bekijk op de NASA FIRMS-kaart ↗</a>';
}

function render(){
  const layout = document.getElementById('layout');
  layout.innerHTML = renderSaveErrorBanner() + renderSidebar() + renderMain();
  const modalHost = document.getElementById('modal-host');
  if(modalHost) modalHost.innerHTML = renderBackupModal() + renderSettingsModal() + renderDayDetailModal();
  const trip = state.trips.find(t=>t.id===state.selectedTripId);
  if(trip){ trip.stops.forEach(s=>{ ensureWeather(s); ensureAirQuality(s); ensureFirms(s); }); }
}

loadSettings();
loadTrips();
</script>
</body>
</html>
